<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="description" content="バーが的ゾーンに入った瞬間にタップし続けるバカゲー。正解するほどテンポが速くなる。ズレたら即終了。">
<meta property="og:title" content="リズムタップ選手権 | バカゲー製作所">
<meta property="og:description" content="バーが満タンになる瞬間を狙ってタップ!正解するほどテンポが速くなるリズム感バカゲー。">

gtag('js', new Date());

<style>
:root{--bg:#FFD100;--gear:#E8B400;--ink:#181820;--pink:#FF5C78;--blue:#0076CE}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans",Meiryo,sans-serif;display:flex;flex-direction:column;touch-action:manipulation;user-select:none;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain}
body.playing{overflow:hidden}
a{color:var(--ink)}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:900;font-size:.9rem}
.topbar a{text-decoration:none;opacity:.75}
.stage{flex:1;position:relative;display:flex;align-items:center;justify-content:center;padding:16px}
.panel{width:100%;max-width:420px;text-align:center}

.card{background:#fff;border:4px solid var(--ink);border-radius:16px;padding:26px 22px;box-shadow:8px 8px 0 var(--ink);max-height:calc(100vh - 32px);overflow-y:auto}
.card h1{font-size:1.5rem;margin-bottom:10px}
.card p{font-size:.92rem;line-height:1.6;margin-bottom:16px}
.btn{display:inline-block;width:100%;padding:16px;font-size:1.1rem;font-weight:900;border:4px solid var(--ink);border-radius:12px;background:var(--pink);color:var(--ink);box-shadow:6px 6px 0 var(--ink);cursor:pointer;transition:transform .08s}
.btn:active{transform:translate(3px,3px);box-shadow:3px 3px 0 var(--ink)}
.btn.secondary{background:#fff;margin-top:12px}
.btn.share{background:var(--blue);color:#fff;margin-top:12px}

#screen-play{width:100%;height:100%;position:absolute;inset:0;display:none;flex-direction:column}
#screen-play.active{display:flex}
.hud{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;font-weight:900}

.beatbar-wrap{position:relative;height:26px;margin:0 20px;border:3px solid var(--ink);border-radius:8px;background:#fff;overflow:hidden}
.beatbar-wrap.late{animation:latePulse .3s ease-in-out infinite}
@keyframes latePulse{0%,100%{box-shadow:inset 0 0 0 0 rgba(255,92,120,.7)}50%{box-shadow:inset 0 0 0 6px rgba(255,92,120,0)}}
#target-zone{position:absolute;top:0;right:0;height:100%;width:28%;background:rgba(255,92,120,.4);border-left:3px solid var(--ink);z-index:1;pointer-events:none}
#beatbar{position:absolute;top:0;left:0;height:100%;width:0%;background:var(--blue);z-index:2;pointer-events:none}

#beat-status{text-align:center;font-weight:900;font-size:1rem;min-height:1.4em;margin-top:10px;pointer-events:none}

.tapzone{flex:1;margin:14px 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:#fff;border:4px solid var(--ink);border-radius:20px;box-shadow:8px 8px 0 var(--ink);cursor:pointer;transition:transform .08s,background-color .1s}
.tapzone:active{transform:translate(3px,3px)}
.tapzone.hit{background:#8CE99A}
.tapzone.wrong{background:var(--pink);animation:shake .3s ease-out}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
#drum-icon{font-size:3.4rem}
.tap-label{font-weight:900;font-size:1.05rem}

.howto{text-align:center;font-size:.85rem;font-weight:900;opacity:.7;padding:4px 16px 14px;pointer-events:none}

.title-badge{display:inline-block;background:var(--bg);border:3px solid var(--ink);border-radius:10px;padding:6px 14px;font-weight:900;font-size:1.15rem;margin:10px 0}
.rank-line{font-size:.95rem;margin-bottom:6px}
.combo-count{font-size:2.4rem;font-weight:900;color:var(--pink)}
footer{text-align:center;padding:10px;font-size:.72rem;opacity:.6}
</style>
</head>
<body>

<div class="topbar">
  <a href="../../">← バカゲー製作所</a>
  <span>🥁 リズムタップ選手権</span>
</div>

<div class="stage">
  <div class="panel" id="panel-outer">

    <div class="card" id="screen-start">
      <h1>🥁 リズムタップ選手権</h1>
      <p>バーが的(まと)ゾーンに入って満タンになる瞬間にタップ。<br>正解するほどテンポが速くなる。<br>早すぎても遅すぎても即終了。</p>
      <button class="btn" id="btn-start">タップして開始</button>
    </div>

    <div class="card" id="screen-result" style="display:none">
      <h1>結果発表</h1>
      <div class="combo-count" id="result-count">0</div>
      <p style="margin-bottom:4px">連続成功</p>
      <div class="title-badge" id="result-title">称号</div>
      <p class="rank-line" id="result-rank"></p>
      <button class="btn share" id="btn-share">Xでシェアする</button>
      <button class="btn secondary" id="btn-retry">もう一度あそぶ</button>
    </div>

  </div>

  <div id="screen-play">
    <div class="hud">
      <span>連続: <b id="score-num">0</b></span>
      <span>🎵 <b id="bpm-num">-</b> BPM</span>
    </div>
    <div class="beatbar-wrap" id="beatbar-wrap">
      <div id="target-zone"></div>
      <div id="beatbar"></div>
    </div>
    <div id="beat-status"></div>
    <div class="tapzone" id="tapzone">
      <div id="drum-icon">🥁</div>
      <div class="tap-label">タップ!</div>
    </div>
    <div class="howto">👆 バーが的ゾーンで満タンになる瞬間にタップ!</div>
  </div>
</div>

<footer>バカゲー製作所 | <a href="https://x.com/bakage_com">@bakage_com</a></footer>

<script>
(function(){
  var GAME_URL = 'https://bakage.com/games/rizumu-tap/';
  var TAP_COOLDOWN_MS = 50;
  var BEAT_START_MS = 780;
  var BEAT_MIN_MS = 340;
  var BEAT_STEP_MS = 22;
  var TOL_START_MS = 230;
  var TOL_MIN_MS = 80;
  var TOL_STEP_MS = 7;
  var NEXT_ROUND_DELAY_MS = 150;
  var REVEAL_DELAY_MS = 550;
  var RANK_COEF = 150;
  var CLICK_FREQ = 720;
  var CLICK_DUR_MS = 55;

  var running = false;
  var score = 0;
  var beatMs = BEAT_START_MS;
  var tolMs = TOL_START_MS;
  var roundTimeoutId = null;
  var clickTimeoutId = null;
  var nextRoundTimeoutId = null;
  var roundStartAt = 0;
  var roundLocked = true;
  var roundToken = 0;
  var lastTapAt = 0;
  var audioCtx = null;

  var screenStart = document.getElementById('screen-start');
  var screenPlay = document.getElementById('screen-play');
  var screenResult = document.getElementById('screen-result');
  var scoreNumEl = document.getElementById('score-num');
  var bpmNumEl = document.getElementById('bpm-num');
  var beatbarEl = document.getElementById('beatbar');
  var beatbarWrapEl = document.getElementById('beatbar-wrap');
  var targetZoneEl = document.getElementById('target-zone');
  var beatStatusEl = document.getElementById('beat-status');
  var tapzoneEl = document.getElementById('tapzone');

  function titleFor(s){
    if(s < 3) return 'リズム音痴の烙印';
    if(s < 6) return 'まずまずのリズム感';
    if(s < 10) return 'なかなかのリズム感';
    if(s < 16) return 'リズムマスター';
    return '伝説のグルーヴ王';
  }

  function rankFor(s){
    var rank = 999983 - Math.round(s * s * RANK_COEF);
    if(rank < 2) rank = 2;
    return rank;
  }

  function ensureAudioCtx(){
    if(!audioCtx){
      var AC = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AC();
    }
    if(audioCtx.state === 'suspended'){
      audioCtx.resume();
    }
  }

  function playClick(){
    if(!audioCtx) return;
    var t0 = audioCtx.currentTime;
    var dur = CLICK_DUR_MS / 1000;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(CLICK_FREQ, t0);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(0.28, t0 + 0.008);
    gain.gain.linearRampToValueAtTime(0, t0 + dur);
    osc.start(t0);
    osc.stop(t0 + dur + 0.02);
  }

  function clearRoundTimers(){
    clearTimeout(roundTimeoutId);
    clearTimeout(clickTimeoutId);
    clearTimeout(nextRoundTimeoutId);
    roundTimeoutId = null;
    clickTimeoutId = null;
    nextRoundTimeoutId = null;
  }

  function layoutTargetZone(){
    var pct = Math.min(70, (tolMs / beatMs) * 100);
    targetZoneEl.style.width = pct + '%';
  }

  function renderBeat(){
    ensureAudioCtx();
    var myToken = ++roundToken;
    clearRoundTimers();
    roundLocked = false;

    bpmNumEl.textContent = String(Math.round(60000 / beatMs));
    beatStatusEl.textContent = '';
    tapzoneEl.classList.remove('hit', 'wrong');
    beatbarWrapEl.classList.remove('late');
    layoutTargetZone();

    beatbarEl.style.transition = 'none';
    beatbarEl.style.width = '0%';
    void beatbarEl.offsetWidth;
    roundStartAt = Date.now();
    beatbarEl.style.transition = 'width ' + beatMs + 'ms linear';
    beatbarEl.style.width = '100%';

    clickTimeoutId = setTimeout(function(){
      clickTimeoutId = null;
      if(myToken === roundToken && running){
        playClick();
        if(!roundLocked) beatbarWrapEl.classList.add('late');
      }
    }, beatMs);

    roundTimeoutId = setTimeout(function(){
      roundTimeoutId = null;
      if(myToken === roundToken && running && !roundLocked) missBeat();
    }, beatMs + tolMs);
  }

  function missBeat(){
    roundLocked = true;
    clearRoundTimers();
    beatbarWrapEl.classList.remove('late');
    beatStatusEl.textContent = '遅い!';
    tapzoneEl.classList.add('wrong');
    setTimeout(endGame, REVEAL_DELAY_MS);
  }

  function failEarly(){
    roundLocked = true;
    clearRoundTimers();
    beatbarWrapEl.classList.remove('late');
    beatStatusEl.textContent = '早すぎ!';
    tapzoneEl.classList.add('wrong');
    setTimeout(endGame, REVEAL_DELAY_MS);
  }

  function onTap(e){
    if(e) e.preventDefault();
    if(!running || roundLocked) return;
    var now = Date.now();
    if(now - lastTapAt < TAP_COOLDOWN_MS) return;
    lastTapAt = now;

    var elapsed = now - roundStartAt;
    if(elapsed < beatMs - tolMs){
      failEarly();
      return;
    }
    if(elapsed > beatMs + tolMs){
      missBeat();
      return;
    }

    roundLocked = true;
    clearRoundTimers();
    beatbarWrapEl.classList.remove('late');
    beatStatusEl.textContent = 'ナイスタップ!';
    tapzoneEl.classList.add('hit');
    score++;
    scoreNumEl.textContent = String(score);
    beatMs = Math.max(BEAT_MIN_MS, beatMs - BEAT_STEP_MS);
    tolMs = Math.max(TOL_MIN_MS, tolMs - TOL_STEP_MS);
    var myToken = roundToken;
    nextRoundTimeoutId = setTimeout(function(){
      nextRoundTimeoutId = null;
      if(running && myToken === roundToken) renderBeat();
    }, NEXT_ROUND_DELAY_MS);
  }

  function startGame(){
    ensureAudioCtx();
    roundToken++;
    clearRoundTimers();

    running = true;
    score = 0;
    beatMs = BEAT_START_MS;
    tolMs = TOL_START_MS;
    lastTapAt = 0;
    roundLocked = true;

    scoreNumEl.textContent = '0';
    tapzoneEl.classList.remove('hit', 'wrong');

    screenStart.style.display = 'none';
    screenResult.style.display = 'none';
    screenPlay.classList.add('active');
    window.scrollTo(0, 0);
    document.body.classList.add('playing');

    renderBeat();
  }

  function endGame(){
    if(!running) return;
    running = false;
    roundToken++;
    clearRoundTimers();
    document.body.classList.remove('playing');

    screenPlay.classList.remove('active');
    screenResult.style.display = 'block';

    var title = titleFor(score);
    var rank = rankFor(score);

    document.getElementById('result-count').textContent = String(score);
    document.getElementById('result-title').textContent = title;
    document.getElementById('result-rank').textContent =
      'あなたは今日、日本で ' + rank.toLocaleString() + ' 番目にリズム感が良い人でした';

    var shareText = 'リズムタップ選手権で' + score + '連続成功して「' + title + '」の称号を獲得!\n日本で' + rank.toLocaleString() + '番目にリズム感が良い人でした。\n#バカゲー製作所';
    var shareUrl = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(shareText) + '&url=' + encodeURIComponent(GAME_URL);
    document.getElementById('btn-share').onclick = function(){
      window.open(shareUrl, '_blank', 'noopener');
    };
  }

  function onStart(e){ if(e) e.preventDefault(); startGame(); }
  function onRetry(e){
    if(e) e.preventDefault();
    screenResult.style.display = 'none';
    screenStart.style.display = 'block';
    window.scrollTo(0, 0);
  }

  var btnStart = document.getElementById('btn-start');
  var btnRetry = document.getElementById('btn-retry');
  btnStart.addEventListener('click', onStart);
  btnStart.addEventListener('touchstart', onStart, {passive:false});
  btnRetry.addEventListener('click', onRetry);
  btnRetry.addEventListener('touchstart', onRetry, {passive:false});

  tapzoneEl.addEventListener('click', onTap);
  tapzoneEl.addEventListener('touchstart', onTap, {passive:false});
})();
</script>
</body>
</html>

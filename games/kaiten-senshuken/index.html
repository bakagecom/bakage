<style>
:root{--bg:#FFB86B;--gear:#F09030;--ink:#181820;--pink:#FF5C78;--blue:#0076CE}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans",Meiryo,sans-serif;display:flex;flex-direction:column;touch-action:manipulation;user-select:none;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain}
body.playing{overflow:hidden}
a{color:var(--ink)}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:900;font-size:.9rem}
.topbar a{text-decoration:none;opacity:.75}
.stage{flex:1;position:relative;display:flex;align-items:center;justify-content:center;padding:16px}
.panel{width:100%;max-width:420px;text-align:center}

.card{background:#fff;border:4px solid var(--ink);border-radius:16px;padding:26px 22px;box-shadow:8px 8px 0 var(--ink);max-height:calc(100vh - 32px);overflow-y:auto}
.card h1{font-size:1.5rem;margin-bottom:10px}
.card p{font-size:.92rem;line-height:1.6;margin-bottom:16px}
.btn{display:inline-block;width:100%;padding:16px;font-size:1.1rem;font-weight:900;border:4px solid var(--ink);border-radius:12px;background:var(--pink);color:var(--ink);box-shadow:6px 6px 0 var(--ink);cursor:pointer;transition:transform .08s}
.btn:active{transform:translate(3px,3px);box-shadow:3px 3px 0 var(--ink)}
.btn.secondary{background:#fff;margin-top:12px}
.btn.share{background:var(--blue);color:#fff;margin-top:12px}

#screen-play{width:100%;height:100%;position:absolute;inset:0;display:none;flex-direction:column}
#screen-play.active{display:flex}
.hud{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;font-weight:900}
.timerbar-wrap{height:14px;margin:0 20px;border:3px solid var(--ink);border-radius:8px;background:#fff;overflow:hidden}
#timerbar{height:100%;background:var(--pink);width:100%;transform-origin:left}

.rotzone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:10px 20px}
.sample-card{background:#fff;border:4px solid var(--ink);border-radius:16px;padding:16px;box-shadow:6px 6px 0 var(--ink)}
.sample-label{font-size:.75rem;font-weight:900;opacity:.6;margin-bottom:8px}

.shape-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:5px}
.sample-grid{width:110px;height:110px;margin:0 auto}
.choice-grid{width:64px;height:64px;margin:0 auto}
.shape-cell{border-radius:5px;background:transparent}
.sample-grid .shape-cell.filled{background:var(--blue)}
.choice-grid .shape-cell.filled{background:var(--ink)}

#choicerow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;width:min(88vw,360px);transition:opacity .15s}
#choicerow.locked{opacity:.4;pointer-events:none}
.choicebtn{display:flex;align-items:center;justify-content:center;padding:12px 6px;border:4px solid var(--ink);border-radius:14px;background:#fff;cursor:pointer;transition:transform .08s;box-shadow:5px 5px 0 var(--ink)}
.choicebtn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink)}
.choicebtn.wrong{animation:shake .3s ease-out;background:var(--pink)}
.choicebtn.wrong .shape-cell.filled{background:#fff}
.choicebtn.correct{background:#8CE99A}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

.howto{text-align:center;font-size:.85rem;font-weight:900;opacity:.7;padding:4px 16px 12px;pointer-events:none}

.title-badge{display:inline-block;background:var(--bg);border:3px solid var(--ink);border-radius:10px;padding:6px 14px;font-weight:900;font-size:1.15rem;margin:10px 0}
.rank-line{font-size:.95rem;margin-bottom:6px}
.combo-count{font-size:2.4rem;font-weight:900;color:var(--pink)}
footer{text-align:center;padding:10px;font-size:.72rem;opacity:.6}
</style>
</head>
<body>

<div class="topbar">
  <a href="../../">← バカゲー製作所</a>
  <span>🔄 回転あて選手権</span>
</div>

<div class="stage">
  <div class="panel" id="panel-outer">

    <div class="card" id="screen-start">
      <h1>🔄 回転あて選手権</h1>
      <p>見本の図形と同じ「回転形」を3択からタップ。<br>鏡写し(反転)にだまされるな。<br>正解するほど考える時間が短くなる。<br>1回間違えたら即終了。</p>
      <button class="btn" id="btn-start">タップして開始</button>
    </div>

    <div class="card" id="screen-result" style="display:none">
      <h1>結果発表</h1>
      <div class="combo-count" id="result-count">0</div>
      <p style="margin-bottom:4px">連続正解</p>
      <div class="title-badge" id="result-title">称号</div>
      <p class="rank-line" id="result-rank"></p>
      <button class="btn share" id="btn-share">Xでシェアする</button>
      <button class="btn secondary" id="btn-retry">もう一度あそぶ</button>
    </div>

  </div>

  <div id="screen-play">
    <div class="hud">
      <span>連続: <b id="score-num">0</b></span>
      <span>⏱ <b id="round-time-num">-</b>s</span>
    </div>
    <div class="timerbar-wrap"><div id="timerbar"></div></div>
    <div class="rotzone">
      <div class="sample-card">
        <div class="sample-label">見本</div>
        <div class="shape-grid sample-grid" id="sample-grid"></div>
      </div>
      <div id="choicerow" class="locked"></div>
    </div>
    <div class="howto">🔄 見本と同じ回転形をタップ!鏡写しに注意</div>
  </div>
</div>

<footer>バカゲー製作所 | <a href="https://x.com/bakage_com">@bakage_com</a></footer>

<script>
(function(){
  var GAME_URL = 'https://bakage.com/games/kaiten-senshuken/';
  var TAP_COOLDOWN_MS = 50;
  var ROUND_START_MS = 4200;
  var ROUND_MIN_MS = 1700;
  var ROUND_STEP_MS = 140;
  var REVEAL_DELAY_MS = 650;
  var NEXT_ROUND_DELAY_MS = 220;
  var RANK_COEF = 300;
  var GRID_N = 3;
  var BASE_SHAPES = [
    [[0,0],[1,0],[2,0],[2,1]],
    [[0,1],[0,2],[1,0],[1,1]]
  ];

  var running = false;
  var score = 0;
  var roundTimeMs = ROUND_START_MS;
  var roundTimeoutId = null;
  var roundTickId = null;
  var nextRoundTimeoutId = null;
  var roundDeadline = 0;
  var lastTapAt = 0;
  var correctIndex = -1;
  var roundLocked = true;
  var roundToken = 0;

  var screenStart = document.getElementById('screen-start');
  var screenPlay = document.getElementById('screen-play');
  var screenResult = document.getElementById('screen-result');
  var scoreNumEl = document.getElementById('score-num');
  var roundTimeNumEl = document.getElementById('round-time-num');
  var timerbarEl = document.getElementById('timerbar');
  var sampleGridEl = document.getElementById('sample-grid');
  var choiceRowEl = document.getElementById('choicerow');

  function titleFor(s){
    if(s < 3) return '回転オンチ';
    if(s < 6) return 'まずまずの空間認識';
    if(s < 10) return '回転を見抜く目';
    if(s < 16) return '空間認識マスター';
    return '伝説の回転王';
  }

  function rankFor(s){
    var rank = 999983 - Math.round(s * s * RANK_COEF);
    if(rank < 2) rank = 2;
    return rank;
  }

  function randInt(min, max){
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function shuffle(arr){
    for(var i = arr.length - 1; i > 0; i--){
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    return arr;
  }

  function rotateCW(cells){
    return cells.map(function(p){ return [p[1], GRID_N - 1 - p[0]]; });
  }

  function mirrorH(cells){
    return cells.map(function(p){ return [p[0], GRID_N - 1 - p[1]]; });
  }

  function cellsKey(cells){
    return cells.slice().sort(function(a, b){ return a[0] - b[0] || a[1] - b[1]; })
      .map(function(p){ return p[0] + '_' + p[1]; }).join(',');
  }

  function cellsHas(cells, r, c){
    for(var i = 0; i < cells.length; i++){
      if(cells[i][0] === r && cells[i][1] === c) return true;
    }
    return false;
  }

  function distinctRotations(cells){
    var states = [];
    var seen = {};
    var cur = cells;
    for(var i = 0; i < 4; i++){
      var key = cellsKey(cur);
      if(!seen[key]){
        seen[key] = true;
        states.push(cur);
      }
      cur = rotateCW(cur);
    }
    return states;
  }

  function renderShapeGrid(container, cells){
    container.innerHTML = '';
    for(var r = 0; r < GRID_N; r++){
      for(var c = 0; c < GRID_N; c++){
        var cell = document.createElement('div');
        cell.className = 'shape-cell';
        if(cellsHas(cells, r, c)) cell.classList.add('filled');
        container.appendChild(cell);
      }
    }
  }

  function genRound(){
    var base = BASE_SHAPES[randInt(0, BASE_SHAPES.length - 1)];
    var sample = base;
    var sampleRotSteps = randInt(0, 3);
    for(var i = 0; i < sampleRotSteps; i++) sample = rotateCW(sample);

    var sampleKey = cellsKey(sample);
    var correctPool = distinctRotations(sample).filter(function(s){ return cellsKey(s) !== sampleKey; });
    if(correctPool.length === 0) correctPool = distinctRotations(sample);
    var correct = correctPool[randInt(0, correctPool.length - 1)];

    var mirrorSample = mirrorH(sample);
    var distractPool = shuffle(distinctRotations(mirrorSample));
    var distractors = distractPool.slice(0, 2);
    var fallbackTry = 0;
    while(distractors.length < 2 && fallbackTry < 10){
      fallbackTry++;
      distractors.push(mirrorSample);
    }

    return { sample: sample, correct: correct, distractors: distractors };
  }

  function clearRoundTimers(){
    clearTimeout(roundTimeoutId);
    clearInterval(roundTickId);
    clearTimeout(nextRoundTimeoutId);
    roundTimeoutId = null;
    roundTickId = null;
    nextRoundTimeoutId = null;
  }

  function startRoundTimer(){
    roundTimeNumEl.textContent = (roundTimeMs / 1000).toFixed(1);
    timerbarEl.style.transition = 'none';
    timerbarEl.style.width = '100%';
    void timerbarEl.offsetWidth;

    roundDeadline = Date.now() + roundTimeMs;
    timerbarEl.style.transition = 'width ' + roundTimeMs + 'ms linear';
    timerbarEl.style.width = '0%';

    roundTickId = setInterval(function(){
      var remaining = Math.max(0, roundDeadline - Date.now());
      roundTimeNumEl.textContent = (remaining / 1000).toFixed(1);
    }, 100);

    roundTimeoutId = setTimeout(function(){
      if(running && !roundLocked) revealAndEnd(-1);
    }, roundTimeMs);
  }

  function renderRound(){
    var myToken = ++roundToken;
    roundLocked = true;
    clearRoundTimers();

    var data = genRound();
    var choiceData = shuffle([
      { cells: data.correct, correct: true },
      { cells: data.distractors[0], correct: false },
      { cells: data.distractors[1], correct: false }
    ]);
    correctIndex = -1;
    for(var i = 0; i < choiceData.length; i++){
      if(choiceData[i].correct) correctIndex = i;
    }

    renderShapeGrid(sampleGridEl, data.sample);

    choiceRowEl.innerHTML = '';
    choiceData.forEach(function(c, i){
      var btn = document.createElement('button');
      btn.className = 'choicebtn';
      btn.dataset.idx = String(i);
      var grid = document.createElement('div');
      grid.className = 'shape-grid choice-grid';
      renderShapeGrid(grid, c.cells);
      btn.appendChild(grid);
      btn.addEventListener('click', onChoiceTap);
      btn.addEventListener('touchstart', onChoiceTap, {passive:false});
      choiceRowEl.appendChild(btn);
    });
    choiceRowEl.classList.remove('locked');

    roundLocked = false;
    if(myToken === roundToken) startRoundTimer();
  }

  function revealAndEnd(tappedIdx){
    roundLocked = true;
    clearRoundTimers();
    choiceRowEl.classList.add('locked');
    var btns = choiceRowEl.querySelectorAll('.choicebtn');
    btns.forEach(function(btn){
      var idx = parseInt(btn.dataset.idx, 10);
      if(idx === correctIndex) btn.classList.add('correct');
      if(idx === tappedIdx && idx !== correctIndex) btn.classList.add('wrong');
    });
    setTimeout(endGame, REVEAL_DELAY_MS);
  }

  function onChoiceTap(e){
    if(e) e.preventDefault();
    if(!running || roundLocked) return;
    var now = Date.now();
    if(now - lastTapAt < TAP_COOLDOWN_MS) return;
    lastTapAt = now;

    var idx = parseInt(this.dataset.idx, 10);
    if(idx === correctIndex){
      roundLocked = true;
      clearRoundTimers();
      this.classList.add('correct');
      score++;
      scoreNumEl.textContent = String(score);
      roundTimeMs = Math.max(ROUND_MIN_MS, roundTimeMs - ROUND_STEP_MS);
      var myToken = roundToken;
      nextRoundTimeoutId = setTimeout(function(){
        nextRoundTimeoutId = null;
        if(running && myToken === roundToken) renderRound();
      }, NEXT_ROUND_DELAY_MS);
    } else {
      revealAndEnd(idx);
    }
  }

  function startGame(){
    roundToken++;
    clearRoundTimers();

    running = true;
    score = 0;
    roundTimeMs = ROUND_START_MS;
    lastTapAt = 0;
    roundLocked = true;

    scoreNumEl.textContent = '0';

    screenStart.style.display = 'none';
    screenResult.style.display = 'none';
    screenPlay.classList.add('active');
    window.scrollTo(0, 0);
    document.body.classList.add('playing');

    renderRound();
  }

  function endGame(){
    if(!running) return;
    running = false;
    roundToken++;
    clearRoundTimers();
    document.body.classList.remove('playing');

    screenPlay.classList.remove('active');
    screenResult.style.display = 'block';

    var title = titleFor(score);
    var rank = rankFor(score);

    document.getElementById('result-count').textContent = String(score);
    document.getElementById('result-title').textContent = title;
    document.getElementById('result-rank').textContent =
      'あなたは今日、日本で ' + rank.toLocaleString() + ' 番目に回転を見抜ける人でした';

    var shareText = '回転あて選手権で' + score + '連続正解して「' + title + '」の称号を獲得!\n日本で' + rank.toLocaleString() + '番目に回転を見抜ける人でした。\n#バカゲー製作所';
    var shareUrl = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(shareText) + '&url=' + encodeURIComponent(GAME_URL);
    document.getElementById('btn-share').onclick = function(){
      window.open(shareUrl, '_blank', 'noopener');
    };
  }

  function onStart(e){ if(e) e.preventDefault(); startGame(); }
  function onRetry(e){
    if(e) e.preventDefault();
    screenResult.style.display = 'none';
    screenStart.style.display = 'block';
    window.scrollTo(0, 0);
  }

  var btnStart = document.getElementById('btn-start');
  var btnRetry = document.getElementById('btn-retry');
  btnStart.addEventListener('click', onStart);
  btnStart.addEventListener('touchstart', onStart, {passive:false});
  btnRetry.addEventListener('click', onRetry);
  btnRetry.addEventListener('touchstart', onRetry, {passive:false});
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AIの無茶ぶりボタン | バカゲー製作所</title>
<meta name="description" content="次々繰り出される無茶な要求を制限時間内に却下し続けるバカゲー。何連続で耐えられるか?">
<meta property="og:title" content="AIの無茶ぶりボタン | バカゲー製作所">
<meta property="og:description" content="無茶な要求を制限時間内に却下せよ。ラウンドを重ねるごとに時間が短くなる。">
<meta property="og:image" content="https://bakage.com/assets/ogp-muchaburi-button.png">
<meta property="og:url" content="https://bakage.com/games/muchaburi-button/">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@bakage_com">
<meta name="twitter:image" content="https://bakage.com/assets/ogp-muchaburi-button.png">
<link rel="icon" type="image/png" href="../../assets/favicon.png">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-JLPMYL3495"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-JLPMYL3495');
</script>
<style>
:root{--bg:#FFD100;--gear:#E8B400;--ink:#181820;--pink:#FF5C78;--blue:#0076CE}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{background:var(--bg);color:var(--ink);font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans",Meiryo,sans-serif;display:flex;flex-direction:column;touch-action:manipulation;user-select:none}
a{color:var(--ink)}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:900;font-size:.9rem}
.topbar a{text-decoration:none;opacity:.75}
.stage{flex:1;position:relative;display:flex;align-items:center;justify-content:center;padding:16px}
.panel{width:100%;max-width:420px;text-align:center}

.card{background:#fff;border:4px solid var(--ink);border-radius:16px;padding:26px 22px;box-shadow:8px 8px 0 var(--ink);max-height:calc(100vh - 32px);overflow-y:auto}
.card h1{font-size:1.5rem;margin-bottom:10px}
.card p{font-size:.92rem;line-height:1.6;margin-bottom:16px}
.btn{display:inline-block;width:100%;padding:16px;font-size:1.1rem;font-weight:900;border:4px solid var(--ink);border-radius:12px;background:var(--pink);color:var(--ink);box-shadow:6px 6px 0 var(--ink);cursor:pointer;transition:transform .08s}
.btn:active{transform:translate(3px,3px);box-shadow:3px 3px 0 var(--ink)}
.btn.secondary{background:#fff;margin-top:12px}
.btn.share{background:var(--blue);color:#fff;margin-top:12px}

#screen-play{width:100%;height:100%;position:absolute;inset:0;display:none;flex-direction:column}
#screen-play.active{display:flex}
.hud{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;font-weight:900}
.gaugewrap{height:20px;margin:0 20px;border:3px solid var(--ink);border-radius:8px;background:#fff;overflow:hidden}
#timebar{height:100%;background:var(--blue);width:100%}

.reqzone{flex:1;display:flex;align-items:center;justify-content:center;padding:16px}
.reqcard{background:#fff;border:4px solid var(--ink);border-radius:14px;padding:22px;box-shadow:6px 6px 0 var(--gear);max-width:380px;width:100%;text-align:center}
.reqlabel{font-size:.72rem;font-weight:900;opacity:.6;margin-bottom:8px}
#req-text{font-size:1.25rem;font-weight:900;line-height:1.5}

.rejectzone{padding:0 20px 8px}
#btn-reject{
  width:100%;padding:20px;font-size:1.3rem;font-weight:900;
  border:6px solid var(--ink);border-radius:16px;background:var(--pink);
  box-shadow:8px 8px 0 var(--ink);cursor:pointer;
}
.howto{text-align:center;font-size:.8rem;opacity:.6;padding:10px 16px 14px;pointer-events:none}

.title-badge{display:inline-block;background:var(--bg);border:3px solid var(--ink);border-radius:10px;padding:6px 14px;font-weight:900;font-size:1.15rem;margin:10px 0}
.rank-line{font-size:.95rem;margin-bottom:6px}
.combo-count{font-size:2.4rem;font-weight:900;color:var(--pink)}
footer{text-align:center;padding:10px;font-size:.72rem;opacity:.6}
</style>
</head>
<body>

<div class="topbar">
  <a href="../../">← バカゲー製作所</a>
  <span>🙅 AIの無茶ぶりボタン</span>
</div>

<div class="stage">
  <div class="panel" id="panel-outer">

    <div class="card" id="screen-start">
      <h1>🙅 AIの無茶ぶりボタン</h1>
      <p>AIが次々に無茶な要求をぶつけてくる。<br>制限時間内に「却下!」をタップして切り返せ。<br>ラウンドを重ねるほど時間が短くなる。何連続耐えられるか?</p>
      <button class="btn" id="btn-start">タップして開始</button>
    </div>

    <div class="card" id="screen-result" style="display:none">
      <h1>結果発表</h1>
      <div class="combo-count" id="result-count">0</div>
      <p style="margin-bottom:4px">連続で却下した</p>
      <div class="title-badge" id="result-title">称号</div>
      <p class="rank-line" id="result-rank"></p>
      <button class="btn share" id="btn-share">Xでシェアする</button>
      <button class="btn secondary" id="btn-retry">もう一度あそぶ</button>
    </div>

  </div>

  <div id="screen-play">
    <div class="hud">
      <span>却下数: <b id="score-num">0</b></span>
      <span>却下せよ!</span>
    </div>
    <div class="gaugewrap">
      <div id="timebar"></div>
    </div>
    <div class="reqzone">
      <div class="reqcard">
        <div class="reqlabel">AIの無茶ぶり</div>
        <div id="req-text">-</div>
      </div>
    </div>
    <div class="rejectzone">
      <button id="btn-reject">却下!</button>
    </div>
    <div class="howto">時間切れになる前にタップしろ</div>
  </div>
</div>

<footer>バカゲー製作所 | <a href="https://x.com/bakage_com">@bakage_com</a></footer>

<script>
(function(){
  var GAME_URL = 'https://bakage.com/games/muchaburi-button/';
  var TICK_MS = 50;
  var ROUND_TIME_INITIAL = 2400;
  var ROUND_TIME_MIN = 900;
  var ROUND_TIME_STEP = 70;

  var REQUESTS = [
    '1分で完璧な炒飯を作ってください',
    '空を飛ぶ方法を今すぐ教えてください',
    '宇宙旅行を今日中に手配してください',
    '猫の気持ちを完全に理解してください',
    '新しい四字熟語を今すぐ作ってください',
    '全人類を笑わせるギャグを1個ください',
    'タイムマシンの設計図を今すぐください',
    '地球の重力を少し弱くしてください',
    'カラスと友達になる方法を教えてください',
    '一瞬でモテる呪文を教えてください',
    '永久機関を今すぐ発明してください',
    '明日の天気を100%当ててください',
    '見えない敵と戦ってください',
    '1分間ずっと真顔でいてください',
    '存在しない色を今すぐ見せてください',
    '世界一長いあくびをしてください',
    '静かに叫んでください',
    'マヨネーズで家を建ててください'
  ];

  var score = 0;
  var roundTimeMs = ROUND_TIME_INITIAL;
  var remainingMs = ROUND_TIME_INITIAL;
  var tickId = null;
  var running = false;
  var lastReqIndex = -1;

  var screenStart = document.getElementById('screen-start');
  var screenPlay = document.getElementById('screen-play');
  var screenResult = document.getElementById('screen-result');
  var timebarEl = document.getElementById('timebar');
  var reqTextEl = document.getElementById('req-text');
  var scoreNumEl = document.getElementById('score-num');

  function titleFor(s){
    if(s <= 0) return 'AIに即服従した人';
    if(s < 3) return '無茶ぶり初心者';
    if(s < 6) return '無茶ぶり耐性あり';
    if(s < 10) return '無茶ぶりマスター';
    return 'AI越えの無茶ぶり神';
  }

  function rankFor(s){
    var rank = 999983 - Math.round(s * s * 600);
    if(rank < 2) rank = 2;
    return rank;
  }

  function pickRequest(){
    if(REQUESTS.length <= 1) return 0;
    var idx = Math.floor(Math.random() * REQUESTS.length);
    if(idx === lastReqIndex) idx = (idx + 1) % REQUESTS.length;
    lastReqIndex = idx;
    return idx;
  }

  function nextRound(){
    clearInterval(tickId);
    reqTextEl.textContent = REQUESTS[pickRequest()];
    remainingMs = roundTimeMs;
    timebarEl.style.width = '100%';

    tickId = setInterval(function(){
      remainingMs -= TICK_MS;
      if(remainingMs <= 0){
        clearInterval(tickId);
        endGame();
        return;
      }
      timebarEl.style.width = Math.max(0, (remainingMs / roundTimeMs) * 100) + '%';
    }, TICK_MS);
  }

  function startGame(){
    clearInterval(tickId);
    score = 0;
    roundTimeMs = ROUND_TIME_INITIAL;
    scoreNumEl.textContent = '0';
    lastReqIndex = -1;
    running = true;

    screenStart.style.display = 'none';
    screenResult.style.display = 'none';
    screenPlay.classList.add('active');

    nextRound();
  }

  var lastTapAt = 0;
  function onReject(e){
    if(!running) return;
    if(e) e.preventDefault();
    var now = Date.now();
    if(now - lastTapAt < 50) return;
    lastTapAt = now;

    score++;
    scoreNumEl.textContent = String(score);
    roundTimeMs = Math.max(ROUND_TIME_MIN, roundTimeMs - ROUND_TIME_STEP);
    nextRound();
  }

  function endGame(){
    if(!running) return;
    running = false;
    clearInterval(tickId);

    screenPlay.classList.remove('active');
    screenResult.style.display = 'block';

    document.getElementById('result-count').textContent = String(score);
    document.getElementById('result-title').textContent = titleFor(score);
    document.getElementById('result-rank').textContent =
      'あなたは今日、日本で ' + rankFor(score).toLocaleString() + ' 番目にAIの無茶ぶりをかわした人でした';

    var shareText = 'AIの無茶ぶりを' + score + '連続で却下して「' + titleFor(score) + '」の称号を獲得!\n日本で' + rankFor(score).toLocaleString() + '番目にAIの無茶ぶりをかわした人でした。\n#バカゲー製作所';
    var shareUrl = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(shareText) + '&url=' + encodeURIComponent(GAME_URL);
    document.getElementById('btn-share').onclick = function(){
      window.open(shareUrl, '_blank', 'noopener');
    };
  }

  document.getElementById('btn-start').addEventListener('click', startGame);
  document.getElementById('btn-start').addEventListener('touchstart', function(e){e.preventDefault(); startGame();}, {passive:false});
  document.getElementById('btn-retry').addEventListener('click', function(){
    screenResult.style.display = 'none';
    screenStart.style.display = 'block';
  });
  document.getElementById('btn-retry').addEventListener('touchstart', function(e){
    e.preventDefault();
    screenResult.style.display = 'none';
    screenStart.style.display = 'block';
  }, {passive:false});

  var rejectBtn = document.getElementById('btn-reject');
  rejectBtn.addEventListener('click', onReject);
  rejectBtn.addEventListener('touchstart', onReject, {passive:false});
})();
</script>
</body>
</html>

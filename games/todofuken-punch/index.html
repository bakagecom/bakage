html,body{height:100%;overflow:hidden;overscroll-behavior:none}

.note{font-size:.75rem;opacity:.6;margin-bottom:18px}
.btn{display:inline-block;width:100%;padding:16px;font-size:1.1rem;font-weight:900;border:4px solid var(--ink);border-radius:12px;background:var(--pink);color:var(--ink);box-shadow:6px 6px 0 var(--ink);cursor:pointer;transition:transform .08s}
.btn:active{transform:translate(3px,3px);box-shadow:3px 3px 0 var(--ink)}
.btn.secondary{background:#fff;margin-top:12px}
.btn.share{background:var(--blue);color:#fff;margin-top:12px}

#screen-play{width:100%;height:100%;position:absolute;inset:0;display:none;flex-direction:column;overflow-y:auto}

.hud{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;font-weight:900}
.timerbar-wrap{height:14px;margin:0 20px;border:3px solid var(--ink);border-radius:8px;background:#fff;overflow:hidden}
#timerbar{height:100%;background:var(--pink);width:100%;transform-origin:left}

.silzone{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;position:relative;padding:8px}
.silcard{background:#fff;border:5px solid var(--ink);border-radius:20px;box-shadow:8px 8px 0 var(--gear);width:min(64vw,34vh,240px);height:min(64vw,34vh,240px);display:flex;align-items:center;justify-content:center;padding:14px}
#silsvg{width:100%;height:100%}
#silsvg path{fill:var(--ink)}

.feedback{position:absolute;left:50%;top:8%;transform:translateX(-50%);background:var(--ink);color:#fff;font-weight:900;font-size:.9rem;padding:8px 16px;border-radius:10px;opacity:0;transition:opacity .15s;text-align:center;max-width:88%;pointer-events:none}
.feedback.show{opacity:1}
.feedback.correct{background:#1a9b57}
.feedback.wrong{background:var(--pink);color:var(--ink)}

.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 18px 22px}
.choice{background:#fff;border:4px solid var(--ink);border-radius:12px;padding:14px 8px;font-weight:900;font-size:.95rem;box-shadow:5px 5px 0 var(--ink);cursor:pointer;transition:transform .08s}
.choice:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink)}
.choice:focus-visible{outline:3px solid var(--blue)}
.choice.correct{background:#1a9b57;color:#fff}
.choice.wrong{background:var(--pink)}

.title-badge{display:inline-block;background:var(--bg);border:3px solid var(--ink);border-radius:10px;padding:6px 14px;font-weight:900;font-size:1.1rem;margin:10px 0}

.score-count{font-size:2.4rem;font-weight:900;color:var(--pink)}
footer{text-align:center;padding:10px;font-size:.72rem;opacity:.6}

    return rank;
  }

  function shuffle(arr){
    for(var i = arr.length - 1; i > 0; i--){
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    return arr;
  }

  function shuffleDeck(){
    deck = shuffle(PREFS.map(function(_, i){ return i; }));
  }

  function startGame(){
    clearInterval(timerId);
    clearTimeout(answerTimeoutId);
    score = 0;
    timeLeft = DURATION;
    locked = false;
    scoreNumEl.textContent = '0';
    timeNumEl.textContent = String(DURATION);
    timerbarEl.style.transition = 'none';
    timerbarEl.style.width = '100%';

    screenStart.style.display = 'none';
    screenResult.style.display = 'none';
    screenPlay.classList.add('active');

    shuffleDeck();
    nextQuestion();

    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        timerbarEl.style.transition = 'width ' + DURATION + 's linear';
        timerbarEl.style.width = '0%';
      });
    });

    timerId = setInterval(function(){
      timeLeft -= 1;
      timeNumEl.textContent = String(Math.max(timeLeft, 0));
      if(timeLeft <= 0){
        clearInterval(timerId);
        endGame();
      }
    }, 1000);
  }

  function nextQuestion(){
    var previous = current;
    if(deck.length === 0) shuffleDeck();
    if(deck.length > 1 && deck[deck.length - 1] === previous){
      var swapAt = Math.floor(Math.random() * (deck.length - 1));
      var tmp = deck[deck.length - 1];
      deck[deck.length - 1] = deck[swapAt];
      deck[swapAt] = tmp;
    }
    current = deck.pop();
    var level = Math.floor(Math.random() * 3);
    silpathEl.setAttribute('d', PREFS[current].d[level]);
    feedbackEl.className = 'feedback';
    feedbackEl.textContent = '';

    var wrongPool = PREFS.map(function(_, i){ return i; }).filter(function(i){ return i !== current; });
    shuffle(wrongPool);
    var options = [current, wrongPool[0], wrongPool[1], wrongPool[2]];
    shuffle(options);

    choicesEl.innerHTML = '';
    options.forEach(function(idx){
      var btn = document.createElement('div');
      btn.className = 'choice';
      btn.textContent = PREFS[idx].name;
      btn.setAttribute('role', 'button');
      btn.setAttribute('tabindex', '0');
      function fire(e){ e.preventDefault(); checkAnswer(idx, btn); }
      btn.addEventListener('click', fire);
      btn.addEventListener('touchstart', fire, {passive: false});
      btn.addEventListener('keydown', function(e){
        if(e.key === 'Enter' || e.key === ' ') fire(e);
      });
      choicesEl.appendChild(btn);
    });
  }

  function checkAnswer(selectedIdx, btnEl){
    var now = Date.now();
    if(now - lastTapAt < 50) return;
    lastTapAt = now;
    if(locked || timeLeft <= 0) return;
    locked = true;
    var correctName = PREFS[current].name;
    var isCorrect = selectedIdx === current;

    if(isCorrect){
      score += 1;
      scoreNumEl.textContent = String(score);
      btnEl.classList.add('correct');
      feedbackEl.textContent = '正解!👊';
      feedbackEl.className = 'feedback correct show';
    } else {
      btnEl.classList.add('wrong');
      Array.prototype.forEach.call(choicesEl.children, function(child){
        if(child.textContent === correctName) child.classList.add('correct');
      });
      feedbackEl.textContent = 'ブッブー!正解は' + correctName + '!' + correctName + '民が激怒中!😡';
      feedbackEl.className = 'feedback wrong show';
    }

    answerTimeoutId = setTimeout(function(){
      locked = false;
      if(timeLeft > 0) nextQuestion();
    }, isCorrect ? 450 : 900);
  }

  function endGame(){
    screenPlay.classList.remove('active');
    screenResult.style.display = 'block';

    document.getElementById('result-count').textContent = String(score);
    document.getElementById('result-title').textContent = titleFor(score);
    document.getElementById('result-rank').textContent =
      'あなたは今日、日本で ' + rankFor(score).toLocaleString() + ' 番目の地理マスターでした';

    var shareText = '都道府県当てパンチで' + score + '問正解して「' + titleFor(score) + '」の称号を獲得!\n#バカゲー製作所';
    var shareUrl = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(shareText) + '&url=' + encodeURIComponent(GAME_URL);
    document.getElementById('btn-share').onclick = function(){
      window.open(shareUrl, '_blank', 'noopener');
    };
  }

  function onRetry(e){
    e.preventDefault();
    screenResult.style.display = 'none';
    screenStart.style.display = 'block';
  }
  function onStart(e){ e.preventDefault(); startGame(); }

  var btnStart = document.getElementById('btn-start');
  var btnRetry = document.getElementById('btn-retry');
  btnStart.addEventListener('click', onStart);
  btnStart.addEventListener('touchstart', onStart, {passive: false});
  btnRetry.addEventListener('click', onRetry);
  btnRetry.addEventListener('touchstart', onRetry, {passive: false});
})();
</script>
</body>
</html>

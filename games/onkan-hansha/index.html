<meta property="og:title" content="音感反射選手権 | バカゲー製作所">

<style>
:root{--bg:#FFD100;--gear:#E8B400;--ink:#181820;--pink:#FF5C78;--blue:#0076CE}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans",Meiryo,sans-serif;display:flex;flex-direction:column;touch-action:manipulation;user-select:none;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain}
body.playing{overflow:hidden}
a{color:var(--ink)}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:900;font-size:.9rem}
.topbar a{text-decoration:none;opacity:.75}
.stage{flex:1;position:relative;display:flex;align-items:center;justify-content:center;padding:16px}
.panel{width:100%;max-width:420px;text-align:center}

.card{background:#fff;border:4px solid var(--ink);border-radius:16px;padding:26px 22px;box-shadow:8px 8px 0 var(--ink);max-height:calc(100vh - 32px);overflow-y:auto}
.card h1{font-size:1.5rem;margin-bottom:10px}
.card p{font-size:.92rem;line-height:1.6;margin-bottom:16px}
.btn{display:inline-block;width:100%;padding:16px;font-size:1.1rem;font-weight:900;border:4px solid var(--ink);border-radius:12px;background:var(--pink);color:var(--ink);box-shadow:6px 6px 0 var(--ink);cursor:pointer;transition:transform .08s}
.btn:active{transform:translate(3px,3px);box-shadow:3px 3px 0 var(--ink)}
.btn.secondary{background:#fff;margin-top:12px}
.btn.share{background:var(--blue);color:#fff;margin-top:12px}

#screen-play{width:100%;height:100%;position:absolute;inset:0;display:none;flex-direction:column}
#screen-play.active{display:flex}
.hud{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;font-weight:900}
.timerbar-wrap{height:14px;margin:0 20px;border:3px solid var(--ink);border-radius:8px;background:#fff;overflow:hidden}
#timerbar{height:100%;background:var(--pink);width:100%;transform-origin:left}

.soundzone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:10px 20px}
#soundcard{background:#fff;border:4px solid var(--ink);border-radius:16px;padding:28px 40px;box-shadow:6px 6px 0 var(--ink);min-width:220px}
#sound-icon{font-size:3rem;transition:transform .12s}
#sound-icon.pulse{animation:soundPulse .5s ease-in-out infinite}
@keyframes soundPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
#sound-status{font-weight:900;margin-top:8px;font-size:1rem}

#answergrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:min(78vw,320px);transition:opacity .15s}
#answergrid.listening{opacity:.4;pointer-events:none}
.answerbtn{aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:1.1rem;font-weight:900;border:4px solid var(--ink);border-radius:14px;background:#fff;cursor:pointer;transition:transform .08s;box-shadow:5px 5px 0 var(--ink)}
.answerbtn .ico{font-size:1.8rem}
.answerbtn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink)}
.answerbtn.wrong{animation:shake .3s ease-out;background:var(--pink)}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

.howto{text-align:center;font-size:.85rem;font-weight:900;opacity:.7;padding:4px 16px 12px;pointer-events:none}

.title-badge{display:inline-block;background:var(--bg);border:3px solid var(--ink);border-radius:10px;padding:6px 14px;font-weight:900;font-size:1.15rem;margin:10px 0}
.rank-line{font-size:.95rem;margin-bottom:6px}
.combo-count{font-size:2.4rem;font-weight:900;color:var(--pink)}
footer{text-align:center;padding:10px;font-size:.72rem;opacity:.6}
</style>
</head>
<body>

<div class="topbar">
  <a href="../../">← バカゲー製作所</a>
  <span>🎵 音感反射選手権</span>
</div>

<div class="stage">
  <div class="panel" id="panel-outer">

    <div class="card" id="screen-start">
      <h1>🎵 音感反射選手権</h1>
      <p>2つの音を聞き比べて、後の音が「高い」か「低い」かをタップ。<br>正解するほど音の差が小さくなり、時間も短くなる。<br>1回間違えたら即終了。🎧音量を上げてね。</p>
      <button class="btn" id="btn-start">タップして開始</button>
    </div>

    <div class="card" id="screen-result" style="display:none">
      <h1>結果発表</h1>
      <div class="combo-count" id="result-count">0</div>
      <p style="margin-bottom:4px">連続正解</p>
      <div class="title-badge" id="result-title">称号</div>
      <p class="rank-line" id="result-rank"></p>
      <button class="btn share" id="btn-share">Xでシェアする</button>
      <button class="btn secondary" id="btn-retry">もう一度あそぶ</button>
    </div>

  </div>

  <div id="screen-play">
    <div class="hud">
      <span>連続: <b id="score-num">0</b></span>
      <span>⏱ <b id="round-time-num">-</b>s</span>
    </div>
    <div class="timerbar-wrap"><div id="timerbar"></div></div>
    <div class="soundzone">
      <div id="soundcard">
        <div id="sound-icon">🔊</div>
        <div id="sound-status">再生中...</div>
      </div>
      <div id="answergrid" class="listening">
        <button class="answerbtn" id="btn-high" data-dir="1"><span class="ico">🔼</span>高い</button>
        <button class="answerbtn" id="btn-low" data-dir="-1"><span class="ico">🔽</span>低い</button>
      </div>
    </div>
    <div class="howto">🎧 後の音が前の音より高いか低いかタップ!</div>
  </div>
</div>

<footer>バカゲー製作所 | <a href="https://x.com/bakage_com">@bakage_com</a></footer>

<script>
(function(){
  var GAME_URL = 'https://bakage.com/games/onkan-hansha/';
  var TAP_COOLDOWN_MS = 50;
  var ROUND_START_MS = 3000;
  var ROUND_MIN_MS = 1400;
  var ROUND_STEP_MS = 130;
  var GAP_START_SEMITONES = 9;
  var GAP_FLOOR_SEMITONES = 2;
  var GAP_STEP_SEMITONES = 0.5;
  var TONE_DUR_MS = 320;
  var TONE_GAP_MS = 140;
  var NEXT_ROUND_DELAY_MS = 200;
  var RANK_COEF = 350;
  var FREQ_MIN = 300;
  var FREQ_MAX = 650;

  var running = false;
  var score = 0;
  var roundTimeMs = ROUND_START_MS;
  var gapSemitones = GAP_START_SEMITONES;
  var roundTimeoutId = null;
  var roundTickId = null;
  var nextRoundTimeoutId = null;
  var roundDeadline = 0;
  var lastTapAt = 0;
  var correctDir = 1;
  var roundLocked = true;
  var roundToken = 0;
  var audioCtx = null;

  var screenStart = document.getElementById('screen-start');
  var screenPlay = document.getElementById('screen-play');
  var screenResult = document.getElementById('screen-result');
  var scoreNumEl = document.getElementById('score-num');
  var roundTimeNumEl = document.getElementById('round-time-num');
  var timerbarEl = document.getElementById('timerbar');
  var soundIconEl = document.getElementById('sound-icon');
  var soundStatusEl = document.getElementById('sound-status');
  var answerGridEl = document.getElementById('answergrid');
  var btnHigh = document.getElementById('btn-high');
  var btnLow = document.getElementById('btn-low');

  function titleFor(s){
    if(s < 3) return '音のイタズラに完敗';
    if(s < 6) return 'まずまずの耳';
    if(s < 10) return 'なかなかの音感';
    if(s < 16) return '音感自慢';
    return '伝説の音感マスター';
  }

  function rankFor(s){
    var rank = 999983 - Math.round(s * s * RANK_COEF);
    if(rank < 2) rank = 2;
    return rank;
  }

  function ensureAudioCtx(){
    if(!audioCtx){
      var AC = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AC();
    }
    if(audioCtx.state === 'suspended'){
      audioCtx.resume();
    }
  }

  function scheduleTone(freq, startTime, durSec){
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, startTime);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    var attack = 0.015, release = 0.05;
    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(0.3, startTime + attack);
    gain.gain.setValueAtTime(0.3, Math.max(startTime + attack, startTime + durSec - release));
    gain.gain.linearRampToValueAtTime(0, startTime + durSec);
    osc.start(startTime);
    osc.stop(startTime + durSec + 0.03);
  }

  function playTwoTones(freq1, freq2, onReady){
    ensureAudioCtx();
    var toneDurSec = TONE_DUR_MS / 1000;
    var gapSec = TONE_GAP_MS / 1000;
    var t0 = audioCtx.currentTime + 0.05;
    scheduleTone(freq1, t0, toneDurSec);
    var t1 = t0 + toneDurSec + gapSec;
    scheduleTone(freq2, t1, toneDurSec);
    var totalMs = ((t1 + toneDurSec) - audioCtx.currentTime) * 1000;
    setTimeout(onReady, totalMs);
  }

  function clearRoundTimers(){
    clearTimeout(roundTimeoutId);
    clearInterval(roundTickId);
    clearTimeout(nextRoundTimeoutId);
    roundTimeoutId = null;
    roundTickId = null;
    nextRoundTimeoutId = null;
  }

  function startRoundTimer(){
    roundTimeNumEl.textContent = (roundTimeMs / 1000).toFixed(1);
    timerbarEl.style.transition = 'none';
    timerbarEl.style.width = '100%';
    void timerbarEl.offsetWidth;

    roundDeadline = Date.now() + roundTimeMs;
    timerbarEl.style.transition = 'width ' + roundTimeMs + 'ms linear';
    timerbarEl.style.width = '0%';

    roundTickId = setInterval(function(){
      var remaining = Math.max(0, roundDeadline - Date.now());
      roundTimeNumEl.textContent = (remaining / 1000).toFixed(1);
    }, 100);

    roundTimeoutId = setTimeout(function(){
      if(running && !roundLocked) endGame();
    }, roundTimeMs);
  }

  function renderRound(){
    var myToken = ++roundToken;
    roundLocked = true;
    clearRoundTimers();

    answerGridEl.classList.add('listening');
    soundIconEl.classList.add('pulse');
    soundStatusEl.textContent = '再生中...';
    roundTimeNumEl.textContent = '-';
    timerbarEl.style.transition = 'none';
    timerbarEl.style.width = '100%';

    var baseFreq = FREQ_MIN + Math.random() * (FREQ_MAX - FREQ_MIN);
    var dir = Math.random() < 0.5 ? -1 : 1;
    correctDir = dir;
    var secondFreq = baseFreq * Math.pow(2, (dir * gapSemitones) / 12);

    playTwoTones(baseFreq, secondFreq, function(){
      if(myToken !== roundToken || !running) return;
      roundLocked = false;
      soundIconEl.classList.remove('pulse');
      soundStatusEl.textContent = '❓ 高い?低い?';
      answerGridEl.classList.remove('listening');
      startRoundTimer();
    });
  }

  function onAnswerTap(e){
    if(e) e.preventDefault();
    if(!running || roundLocked) return;
    var now = Date.now();
    if(now - lastTapAt < TAP_COOLDOWN_MS) return;
    lastTapAt = now;

    var dir = parseInt(this.dataset.dir, 10);
    if(dir === correctDir){
      roundLocked = true;
      clearRoundTimers();
      score++;
      scoreNumEl.textContent = String(score);
      roundTimeMs = Math.max(ROUND_MIN_MS, roundTimeMs - ROUND_STEP_MS);
      gapSemitones = Math.max(GAP_FLOOR_SEMITONES, gapSemitones - GAP_STEP_SEMITONES);
      var myToken = roundToken;
      nextRoundTimeoutId = setTimeout(function(){
        nextRoundTimeoutId = null;
        if(running && myToken === roundToken) renderRound();
      }, NEXT_ROUND_DELAY_MS);
    } else {
      this.classList.add('wrong');
      endGame();
    }
  }

  function startGame(){
    ensureAudioCtx();
    roundToken++;
    clearRoundTimers();

    running = true;
    score = 0;
    roundTimeMs = ROUND_START_MS;
    gapSemitones = GAP_START_SEMITONES;
    lastTapAt = 0;
    roundLocked = true;

    scoreNumEl.textContent = '0';
    document.getElementById('btn-high').classList.remove('wrong');
    document.getElementById('btn-low').classList.remove('wrong');

    screenStart.style.display = 'none';
    screenResult.style.display = 'none';
    screenPlay.classList.add('active');
    window.scrollTo(0, 0);
    document.body.classList.add('playing');

    renderRound();
  }

  function endGame(){
    if(!running) return;
    running = false;
    roundToken++;
    clearRoundTimers();
    document.body.classList.remove('playing');

    screenPlay.classList.remove('active');
    screenResult.style.display = 'block';

    var title = titleFor(score);
    var rank = rankFor(score);

    document.getElementById('result-count').textContent = String(score);
    document.getElementById('result-title').textContent = title;
    document.getElementById('result-rank').textContent =
      'あなたは今日、日本で ' + rank.toLocaleString() + ' 番目に音感が良い人でした';

    var shareText = '音感反射選手権で' + score + '連続正解して「' + title + '」の称号を獲得!\n日本で' + rank.toLocaleString() + '番目に音感が良い人でした。\n#バカゲー製作所';
    var shareUrl = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(shareText) + '&url=' + encodeURIComponent(GAME_URL);
    document.getElementById('btn-share').onclick = function(){
      window.open(shareUrl, '_blank', 'noopener');
    };
  }

  function onStart(e){ if(e) e.preventDefault(); startGame(); }
  function onRetry(e){
    if(e) e.preventDefault();
    screenResult.style.display = 'none';
    screenStart.style.display = 'block';
    window.scrollTo(0, 0);
  }

  var btnStart = document.getElementById('btn-start');
  var btnRetry = document.getElementById('btn-retry');
  btnStart.addEventListener('click', onStart);
  btnStart.addEventListener('touchstart', onStart, {passive:false});
  btnRetry.addEventListener('click', onRetry);
  btnRetry.addEventListener('touchstart', onRetry, {passive:false});

  btnHigh.addEventListener('click', onAnswerTap);
  btnHigh.addEventListener('touchstart', onAnswerTap, {passive:false});
  btnLow.addEventListener('click', onAnswerTap);
  btnLow.addEventListener('touchstart', onAnswerTap, {passive:false});
})();
</script>
</body>
</html>

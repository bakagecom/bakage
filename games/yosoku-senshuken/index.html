<meta property="og:description" content="見えなくなったボールがゴールに届く瞬間をタップで言い当てるだけ。ズレたら即終了、当てるほど見える時間も許容誤差も縮む予測チャレンジ。">

<style>
:root{--bg:#FFD100;--gear:#E8B400;--ink:#181820;--pink:#FF5C78;--blue:#0076CE}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans",Meiryo,sans-serif;display:flex;flex-direction:column;touch-action:manipulation;user-select:none;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain}
body.playing{overflow:hidden}
a{color:var(--ink)}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:900;font-size:.9rem}
.topbar a{text-decoration:none;opacity:.75}
.stage{flex:1;position:relative;display:flex;align-items:center;justify-content:center;padding:16px}
.panel{width:100%;max-width:420px;text-align:center}

.card{background:#fff;border:4px solid var(--ink);border-radius:16px;padding:26px 22px;box-shadow:8px 8px 0 var(--ink);max-height:calc(100vh - 32px);overflow-y:auto}
.card h1{font-size:1.5rem;margin-bottom:10px}
.card p{font-size:.92rem;line-height:1.6;margin-bottom:16px}
.btn{display:inline-block;width:100%;padding:16px;font-size:1.1rem;font-weight:900;border:4px solid var(--ink);border-radius:12px;background:var(--pink);color:var(--ink);box-shadow:6px 6px 0 var(--ink);cursor:pointer;transition:transform .08s}
.btn:active{transform:translate(3px,3px);box-shadow:3px 3px 0 var(--ink)}
.btn.secondary{background:#fff;margin-top:12px}
.btn.share{background:var(--blue);color:#fff;margin-top:12px}
.btn:disabled{opacity:.45;cursor:default}

#screen-play{width:100%;height:100%;position:absolute;inset:0;display:none;flex-direction:column}
#screen-play.active{display:flex}
.hud{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;font-weight:900;font-size:.85rem}

.mainzone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:0 16px;min-height:0}
.track{position:relative;width:100%;max-width:340px;height:96px;background:#fff;border:5px solid var(--ink);border-radius:16px;box-shadow:8px 8px 0 var(--gear);overflow:hidden;flex-shrink:0}
.ball{position:absolute;top:50%;width:34px;height:34px;margin-top:-17px;left:0;border-radius:50%;background:var(--pink);border:4px solid var(--ink);z-index:1}
.curtain{position:absolute;top:0;bottom:0;right:0;width:0;background:repeating-linear-gradient(45deg,var(--ink),var(--ink) 8px,#33333f 8px,#33333f 16px);z-index:2;border-left:4px solid #fff}
.target-line{position:absolute;top:0;bottom:0;width:0;border-left:4px dashed var(--blue);z-index:3}
.target-flag{position:absolute;top:-24px;left:0;transform:translateX(-50%);font-size:1.2rem;z-index:3}

.feedback-line{font-size:.85rem;font-weight:700;min-height:1.3em;text-align:center}
.howto{text-align:center;font-size:.78rem;opacity:.65;padding:0 16px 14px;pointer-events:none}

.title-badge{display:inline-block;background:var(--bg);border:3px solid var(--ink);border-radius:10px;padding:6px 14px;font-weight:900;font-size:1.15rem;margin:10px 0}
.rank-line{font-size:.95rem;margin-bottom:6px}
.reason-line{font-size:.85rem;opacity:.75;margin-bottom:4px}
.combo-count{font-size:2.4rem;font-weight:900;color:var(--pink)}
footer{text-align:center;padding:10px;font-size:.72rem;opacity:.6}
</style>
</head>
<body>

<div class="topbar">
  <a href="../../">← バカゲー製作所</a>
  <span>🎯 着地予測選手権</span>
</div>

<div class="stage">
  <div class="panel" id="panel-outer">

    <div class="card" id="screen-start">
      <h1>🎯 着地予測選手権</h1>
      <p>ボールが動き出したらスピードを見切れ。<br>カーテンの向こうに消えたら、ゴールラインに届く「瞬間」だと思ったタイミングでタップ!<br>ズレが大きいと即終了、当てるほど見える時間も許容誤差もどんどん縮む予測の限界チャレンジ。</p>
      <button class="btn" id="btn-start">タップして開始</button>
    </div>

    <div class="card" id="screen-result" style="display:none">
      <h1>結果発表</h1>
      <div class="combo-count" id="result-count">0</div>
      <p style="margin-bottom:4px">回、タイミングを言い当てた</p>
      <div class="title-badge" id="result-title">称号</div>
      <p class="reason-line" id="result-reason"></p>
      <p class="reason-line" id="result-avg"></p>
      <p class="rank-line" id="result-rank"></p>
      <button class="btn share" id="btn-share">Xでシェアする</button>
      <button class="btn secondary" id="btn-retry">もう一度あそぶ</button>
    </div>

  </div>

  <div id="screen-play">
    <div class="hud">
      <span>成功数: <b id="score-num">0</b></span>
      <span>着地予測集中</span>
    </div>
    <div class="mainzone">
      <div class="track" id="track">
        <div class="ball" id="ball"></div>
        <div class="target-line" id="target-line"><span class="target-flag">🏁</span></div>
        <div class="curtain" id="curtain"></div>
      </div>
      <div class="feedback-line" id="feedback-line">&nbsp;</div>
      <button class="btn" id="btn-predict" disabled>今だ!</button>
    </div>
    <div class="howto" id="howto-text">よーい…</div>
  </div>
</div>

<footer>バカゲー製作所 | <a href="https://x.com/bakage_com">@bakage_com</a></footer>

<script>
(function(){
  var GAME_URL = 'https://bakage.com/games/yosoku-senshuken/';
  var TAP_COOLDOWN_MS = 50;

  var TOLERANCE_START = 260;
  var TOLERANCE_FLOOR = 90;
  var TOLERANCE_STEP = 17;

  var VISIBLE_RATIO_START = 0.62;
  var VISIBLE_RATIO_FLOOR = 0.28;
  var VISIBLE_RATIO_STEP = 0.032;

  var ARRIVAL_MS_MIN = 950;
  var ARRIVAL_MS_MAX = 1850;

  var TIMEOUT_BUFFER_START = 1500;
  var TIMEOUT_BUFFER_FLOOR = 700;
  var TIMEOUT_BUFFER_STEP = 70;

  var READY_DELAY_MS = 350;
  var SUCCESS_PAUSE_MS = 500;
  var RANK_COEF = 300;

  var BALL_SIZE = 34;
  var SIDE_PAD = 6;
  var TARGET_FRACTION = 0.90;

  var running = false;
  var score = 0;
  var state = 'idle'; // 'ready' | 'active' | 'settling'
  var toleranceMs = TOLERANCE_START;
  var visibleRatio = VISIBLE_RATIO_START;
  var timeoutBufferMs = TIMEOUT_BUFFER_START;
  var lastTapAt = 0;
  var genToken = 0;
  var deviations = [];

  var startLeft = 0, maxLeft = 0, targetLeft = 0, curtainStartLeft = 0;
  var speedPxPerMs = 0, arrivalMs = 0;
  var moveStartTime = 0;

  var readyTimeoutId = null;
  var curtainCueTimeoutId = null;
  var hardTimeoutId = null;
  var successTimeoutId = null;

  var screenStart = document.getElementById('screen-start');
  var screenPlay = document.getElementById('screen-play');
  var screenResult = document.getElementById('screen-result');
  var trackEl = document.getElementById('track');
  var ballEl = document.getElementById('ball');
  var curtainEl = document.getElementById('curtain');
  var targetLineEl = document.getElementById('target-line');
  var feedbackEl = document.getElementById('feedback-line');
  var scoreNumEl = document.getElementById('score-num');
  var howtoEl = document.getElementById('howto-text');
  var btnPredictEl = document.getElementById('btn-predict');

  function titleFor(s){
    if(s < 3) return '予測ビギナー';
    if(s < 6) return '体内メトロノーム見習い';
    if(s < 10) return '予知能力の片鱗';
    if(s < 16) return '人間ストップウォッチ';
    return '伝説の着地予測師';
  }

  function rankFor(s){
    var rank = 999983 - Math.round(s * s * RANK_COEF);
    if(rank < 2) rank = 2;
    return rank;
  }

  function randRange(min, max){
    return Math.random() * (max - min) + min;
  }

  function clearAllTimers(){
    clearTimeout(readyTimeoutId);
    clearTimeout(curtainCueTimeoutId);
    clearTimeout(hardTimeoutId);
    clearTimeout(successTimeoutId);
    readyTimeoutId = null;
    curtainCueTimeoutId = null;
    hardTimeoutId = null;
    successTimeoutId = null;
  }

  function layoutTrack(){
    var trackW = trackEl.clientWidth;
    startLeft = SIDE_PAD;
    maxLeft = trackW - BALL_SIZE - SIDE_PAD;
    targetLeft = startLeft + (maxLeft - startLeft) * TARGET_FRACTION;
    curtainStartLeft = startLeft + visibleRatio * (targetLeft - startLeft);

    targetLineEl.style.left = (targetLeft + BALL_SIZE / 2) + 'px';
    curtainEl.style.width = Math.max(0, trackW - curtainStartLeft) + 'px';
  }

  function scheduleRound(){
    if(!running) return;
    state = 'ready';
    feedbackEl.textContent = ' ';
    howtoEl.textContent = 'よーい…';
    btnPredictEl.disabled = true;

    layoutTrack();

    ballEl.style.transition = 'none';
    ballEl.style.left = startLeft + 'px';
    // force reflow so the next transition is picked up cleanly
    void ballEl.offsetWidth;

    arrivalMs = randRange(ARRIVAL_MS_MIN, ARRIVAL_MS_MAX);
    speedPxPerMs = (targetLeft - startLeft) / arrivalMs;
    var fullDurationMs = (maxLeft - startLeft) / speedPxPerMs;
    var curtainEntryMs = (curtainStartLeft - startLeft) / speedPxPerMs;

    var myGen = genToken;
    readyTimeoutId = setTimeout(function(){
      if(!running || myGen !== genToken) return;
      startMoving(fullDurationMs, curtainEntryMs);
    }, READY_DELAY_MS);
  }

  function startMoving(fullDurationMs, curtainEntryMs){
    state = 'active';
    howtoEl.textContent = 'スピードを見切れ!';
    btnPredictEl.disabled = false;

    ballEl.style.transition = 'left ' + fullDurationMs + 'ms linear';
    ballEl.style.left = maxLeft + 'px';
    moveStartTime = performance.now();

    var myGen = genToken;
    curtainCueTimeoutId = setTimeout(function(){
      if(!running || myGen !== genToken) return;
      howtoEl.textContent = '消えた!「今だ」と思ったらタップ!';
    }, curtainEntryMs);

    hardTimeoutId = setTimeout(function(){
      if(!running || myGen !== genToken) return;
      revealBall();
      endGame('timeout');
    }, arrivalMs + timeoutBufferMs);
  }

  function revealBall(){
    var elapsed = performance.now() - moveStartTime;
    var curLeft = startLeft + speedPxPerMs * elapsed;
    if(curLeft > maxLeft) curLeft = maxLeft;
    if(curLeft < startLeft) curLeft = startLeft;
    ballEl.style.transition = 'none';
    ballEl.style.left = curLeft + 'px';
    curtainEl.style.width = '0px';
  }

  function onRoundSuccess(errAbs){
    score++;
    scoreNumEl.textContent = String(score);
    deviations.push(errAbs);
    toleranceMs = Math.max(TOLERANCE_FLOOR, toleranceMs - TOLERANCE_STEP);
    visibleRatio = Math.max(VISIBLE_RATIO_FLOOR, visibleRatio - VISIBLE_RATIO_STEP);
    timeoutBufferMs = Math.max(TIMEOUT_BUFFER_FLOOR, timeoutBufferMs - TIMEOUT_BUFFER_STEP);
    state = 'settling';
    feedbackEl.textContent = 'ジャスト! ズレ ' + Math.round(errAbs) + 'ms';
    btnPredictEl.disabled = true;

    var myGen = genToken;
    successTimeoutId = setTimeout(function(){
      if(!running || myGen !== genToken) return;
      scheduleRound();
    }, SUCCESS_PAUSE_MS);
  }

  function onPredict(e){
    if(e) e.preventDefault();
    if(!running) return;
    var now = Date.now();
    if(now - lastTapAt < TAP_COOLDOWN_MS) return;
    lastTapAt = now;

    if(state !== 'active') return;

    clearTimeout(hardTimeoutId);
    clearTimeout(curtainCueTimeoutId);

    var elapsedMs = performance.now() - moveStartTime;
    var errorMs = elapsedMs - arrivalMs;
    var absErr = Math.abs(errorMs);

    revealBall();

    if(absErr <= toleranceMs){
      onRoundSuccess(absErr);
    } else {
      state = 'settling';
      var dir = errorMs < 0 ? '早すぎた' : '遅すぎた';
      endGame('miss', absErr, dir);
    }
  }

  function startGame(){
    genToken++;
    clearAllTimers();

    running = true;
    score = 0;
    toleranceMs = TOLERANCE_START;
    visibleRatio = VISIBLE_RATIO_START;
    timeoutBufferMs = TIMEOUT_BUFFER_START;
    lastTapAt = 0;
    deviations = [];
    scoreNumEl.textContent = '0';

    screenStart.style.display = 'none';
    screenResult.style.display = 'none';
    screenPlay.classList.add('active');
    window.scrollTo(0, 0);
    document.body.classList.add('playing');

    scheduleRound();
  }

  function endGame(reason, missAbs, dir){
    if(!running) return;
    running = false;
    genToken++;
    clearAllTimers();
    document.body.classList.remove('playing');

    screenPlay.classList.remove('active');
    screenResult.style.display = 'block';

    var title = titleFor(score);
    var rank = rankFor(score);

    var reasonText;
    if(reason === 'timeout') reasonText = '考えすぎてタイムアウト…';
    else reasonText = dir + '!(ズレ ' + Math.round(missAbs) + 'ms)…';

    var avgText;
    if(deviations.length > 0){
      var sum = 0;
      for(var i = 0; i < deviations.length; i++) sum += deviations[i];
      var avg = Math.round(sum / deviations.length);
      avgText = '平均ズレ: ' + avg + 'ms';
    } else {
      avgText = '平均ズレ: --';
    }

    document.getElementById('result-count').textContent = String(score);
    document.getElementById('result-title').textContent = title;
    document.getElementById('result-reason').textContent = reasonText;
    document.getElementById('result-avg').textContent = avgText;
    document.getElementById('result-rank').textContent =
      'あなたは今日、日本で ' + rank.toLocaleString() + ' 番目に着地予測が正確な人でした';

    var shareText = '着地予測選手権で' + score + '回連続でタイミングを言い当てて「' + title + '」の称号を獲得!\n日本で' + rank.toLocaleString() + '番目に着地予測が正確な人でした。\n#バカゲー製作所';
    var shareUrl = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(shareText) + '&url=' + encodeURIComponent(GAME_URL);
    document.getElementById('btn-share').onclick = function(){
      window.open(shareUrl, '_blank', 'noopener');
    };
  }

  function onStart(e){ if(e) e.preventDefault(); startGame(); }
  function onRetry(e){
    if(e) e.preventDefault();
    screenResult.style.display = 'none';
    screenStart.style.display = 'block';
    window.scrollTo(0, 0);
  }

  var btnStartEl = document.getElementById('btn-start');
  var btnRetryEl = document.getElementById('btn-retry');

  btnStartEl.addEventListener('click', onStart);
  btnStartEl.addEventListener('touchstart', onStart, {passive:false});
  btnRetryEl.addEventListener('click', onRetry);
  btnRetryEl.addEventListener('touchstart', onRetry, {passive:false});
  btnPredictEl.addEventListener('click', onPredict);
  btnPredictEl.addEventListener('touchstart', onPredict, {passive:false});
})();
</script>
</body>
</html>

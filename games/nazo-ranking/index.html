<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>謎ランキングメーカー | バカゲー製作所</title>
<meta name="description" content="3秒間タップして謎の選手権にエントリー。あなたは何位?称号は?謎のランキングがその場で生成されるバカゲー。">
<meta property="og:title" content="謎ランキングメーカー | バカゲー製作所">
<meta property="og:description" content="3秒タップしてエントリーするだけ。謎の選手権であなたは何位になる?">
<meta property="og:image" content="https://bakage.com/assets/ogp-nazo-ranking.png">
<meta property="og:url" content="https://bakage.com/games/nazo-ranking/">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@bakage_com">
<meta name="twitter:image" content="https://bakage.com/assets/ogp-nazo-ranking.png">
<link rel="icon" type="image/png" href="../../assets/favicon.png">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-JLPMYL3495"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-JLPMYL3495');
</script>
<style>
:root{--bg:#FFD100;--gear:#E8B400;--ink:#181820;--pink:#FF5C78;--blue:#0076CE}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{background:var(--bg);color:var(--ink);font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans",Meiryo,sans-serif;display:flex;flex-direction:column;touch-action:manipulation;user-select:none}
a{color:var(--ink)}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:900;font-size:.9rem}
.topbar a{text-decoration:none;opacity:.75}
.stage{flex:1;position:relative;display:flex;align-items:center;justify-content:center;padding:16px}
.panel{width:100%;max-width:420px;text-align:center}

.card{background:#fff;border:4px solid var(--ink);border-radius:16px;padding:26px 22px;box-shadow:8px 8px 0 var(--ink);max-height:calc(100vh - 32px);overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y;overscroll-behavior:contain}
.card h1{font-size:1.5rem;margin-bottom:10px}
.card p{font-size:.92rem;line-height:1.6;margin-bottom:16px}
.btn{display:inline-block;width:100%;padding:16px;font-size:1.1rem;font-weight:900;border:4px solid var(--ink);border-radius:12px;background:var(--pink);color:var(--ink);box-shadow:6px 6px 0 var(--ink);cursor:pointer;transition:transform .08s}
.btn:active{transform:translate(3px,3px);box-shadow:3px 3px 0 var(--ink)}
.btn.secondary{background:#fff;margin-top:12px}
.btn.share{background:var(--blue);color:#fff;margin-top:12px}

#screen-play{width:100%;height:100%;position:absolute;inset:0;display:none;flex-direction:column}
#screen-play.active{display:flex}
.hud{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;font-weight:900}
.timerbar-wrap{height:14px;margin:0 20px;border:3px solid var(--ink);border-radius:8px;background:#fff;overflow:hidden}
#timerbar{height:100%;background:var(--pink);width:100%;transform-origin:left}
.tapzone{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
#tapbtn{
  width:min(56vw,34vh,220px);height:min(56vw,34vh,220px);border-radius:50%;
  background:#fff;border:6px solid var(--ink);box-shadow:8px 8px 0 var(--gear);
  font-size:1.3rem;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;text-align:center;padding:10px;
  animation:breathe .85s ease-in-out infinite;
}
#tapbtn.tapped{animation:tapPop .22s ease-out}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes tapPop{
  0%{transform:scale(1);background:#fff}
  35%{transform:scale(0.86);background:var(--pink)}
  100%{transform:scale(1);background:#fff}
}
.howto{position:absolute;bottom:18px;left:0;right:0;text-align:center;font-size:1rem;font-weight:900;opacity:.85;pointer-events:none;animation:howtoBlink 1.1s ease-in-out infinite}
@keyframes howtoBlink{0%,100%{opacity:.5}50%{opacity:1}}
#charge-num{display:inline-block}
#charge-num.pop{animation:numPop .25s ease-out}
@keyframes numPop{0%{transform:scale(1)}45%{transform:scale(1.5);color:var(--pink)}100%{transform:scale(1)}}
.float-num{
  position:absolute;left:50%;top:50%;
  font-size:1.7rem;font-weight:900;color:var(--pink);
  pointer-events:none;
  animation:floatUp .6s ease-out forwards;
}
@keyframes floatUp{
  0%{transform:translate(calc(-50% + var(--dx,0px)),-50%) scale(0.9);opacity:1}
  100%{transform:translate(calc(-50% + var(--dx,0px)),calc(-50% - 80px)) scale(1.2);opacity:0}
}

#screen-tally{width:100%;height:100%;position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column}
#screen-tally.active{display:flex}
#screen-tally .spin{font-size:3rem;animation:spin 1s linear infinite}
#screen-tally p{margin-top:16px;font-weight:900}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

.theme-title{font-size:1.15rem;font-weight:900;line-height:1.5;margin-bottom:12px}
.title-badge{display:inline-block;background:var(--bg);border:3px solid var(--ink);border-radius:10px;padding:6px 14px;font-weight:900;font-size:1.1rem;margin:6px 0 14px}
table.ranktable{width:100%;border-collapse:collapse;margin-bottom:16px;font-size:.85rem}
table.ranktable th,table.ranktable td{border:2px solid var(--ink);padding:6px 4px;text-align:center}
table.ranktable th{background:var(--bg)}
table.ranktable tr.me td{background:var(--pink);font-weight:900}
footer{text-align:center;padding:10px;font-size:.72rem;opacity:.6}
</style>
</head>
<body>

<div class="topbar">
  <a href="../../">← バカゲー製作所</a>
  <span>🏆 謎ランキングメーカー</span>
</div>

<div class="stage">
  <div class="panel" id="panel-outer">

    <div class="card" id="screen-start">
      <h1>🏆 謎ランキングメーカー</h1>
      <p>謎の選手権が毎回ランダムに開催される。<br>3秒間タップして気合いを溜めてエントリーしろ。<br>あなたは何位?称号は?</p>
      <button class="btn" id="btn-start">タップしてエントリー</button>
    </div>

    <div class="card" id="screen-result" style="display:none">
      <h1>結果発表</h1>
      <p class="theme-title" id="result-theme"></p>
      <div class="title-badge" id="result-title">称号</div>
      <table class="ranktable" id="result-table">
        <thead><tr><th>順位</th><th>参加者</th><th>記録</th></tr></thead>
        <tbody id="result-tbody"></tbody>
      </table>
      <button class="btn share" id="btn-share">Xでシェアする</button>
      <button class="btn secondary" id="btn-retry">もう一度あそぶ</button>
    </div>

  </div>

  <div id="screen-play">
    <div class="hud">
      <span>気合い: <b id="charge-num">0</b></span>
      <span>⏱ <b id="time-num">3</b>s</span>
    </div>
    <div class="timerbar-wrap"><div id="timerbar"></div></div>
    <div class="tapzone" id="tapzone">
      <button id="tapbtn">連打!</button>
    </div>
    <div class="howto">👆 連打して気合いを溜めろ!</div>
  </div>

  <div id="screen-tally">
    <div class="spin">🌀</div>
    <p>謎の選手権を集計中...</p>
  </div>
</div>

<footer>バカゲー製作所 | <a href="https://x.com/bakage_com">@bakage_com</a></footer>

<script>
(function(){
  var DURATION = 3;
  var GAME_URL = 'https://bakage.com/games/nazo-ranking/';

  var THEMES = [
    {title:'第37回 全国「靴下 片方だけ行方不明」選手権', unit:'足/年'},
    {title:'エレベーターの「閉」ボタン 連打選手権', unit:'回/日'},
    {title:'冷蔵庫を無意味に開け閉め選手権', unit:'回/日'},
    {title:'布団から出るまでの時間 耐久戦', unit:'分'},
    {title:'既読スルー 我慢比べ選手権', unit:'時間'},
    {title:'一人で鼻歌が漏れて赤面した回数選手権', unit:'回/月'},
    {title:'目覚まし二度寝スヌーズ選手権', unit:'回/朝'},
    {title:'家で「さっきまであったのに」選手権', unit:'回/週'},
    {title:'コンビニ無言会計 選手権', unit:'回/月'},
    {title:'ドア閉めた後に戻って確認選手権', unit:'回/週'},
    {title:'カップ麺のお湯を待てずに開けちゃう選手権', unit:'回/月'},
    {title:'信号待ちで貧乏ゆすり選手権', unit:'回/日'}
  ];

  var ENTRANTS = ['匿名希望A','覆面参加者','通りすがりの猛者','名無しの達人','謎のベテラン','自称・玄人','地元代表(自称)','毎回参加してる人','常連さん','今回初参加','ダークホース','謎の全国代表'];

  var charge = 0;
  var timeLeft = DURATION;
  var timerId = null;
  var tallyTimeoutId = null;
  var lastThemeIndex = -1;

  var screenStart = document.getElementById('screen-start');
  var screenPlay = document.getElementById('screen-play');
  var screenTally = document.getElementById('screen-tally');
  var screenResult = document.getElementById('screen-result');
  var tapbtn = document.getElementById('tapbtn');
  var chargeNumEl = document.getElementById('charge-num');
  var timeNumEl = document.getElementById('time-num');
  var timerbarEl = document.getElementById('timerbar');

  function shuffle(arr){
    var a = arr.slice();
    for(var i = a.length - 1; i > 0; i--){
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function badgeFor(rank){
    if(rank === 1) return '殿堂入り(初代王者)';
    if(rank <= 3) return '表彰台(トップ3)';
    if(rank <= 6) return '本選出場おめでとう';
    return '参加賞(次があるさ)';
  }

  function startGame(){
    clearInterval(timerId);
    clearTimeout(tallyTimeoutId);
    charge = 0;
    timeLeft = DURATION;
    chargeNumEl.textContent = '0';
    timeNumEl.textContent = String(DURATION);
    timerbarEl.style.transition = 'none';
    timerbarEl.style.width = '100%';
    tapbtn.classList.remove('tapped');
    var leftoverFloats = tapzoneEl.querySelectorAll('.float-num');
    for(var i = 0; i < leftoverFloats.length; i++) leftoverFloats[i].remove();

    screenStart.style.display = 'none';
    screenResult.style.display = 'none';
    screenTally.classList.remove('active');
    screenPlay.classList.add('active');

    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        timerbarEl.style.transition = 'width ' + DURATION + 's linear';
        timerbarEl.style.width = '0%';
      });
    });

    timerId = setInterval(function(){
      timeLeft -= 1;
      timeNumEl.textContent = String(Math.max(timeLeft,0));
      if(timeLeft <= 0){
        clearInterval(timerId);
        goTally();
      }
    }, 1000);
  }

  function retriggerAnim(el, cls){
    el.classList.remove(cls);
    void el.offsetWidth; // force reflow so the animation restarts even on rapid repeats
    el.classList.add(cls);
  }
  tapbtn.addEventListener('animationend', function(e){
    if(e.animationName === 'tapPop') tapbtn.classList.remove('tapped'); // let the idle breathing animation resume between taps
  });

  var tapzoneEl = document.getElementById('tapzone');
  function spawnFloatNum(n){
    var el = document.createElement('div');
    el.className = 'float-num';
    el.textContent = n;
    el.style.setProperty('--dx', (Math.random() * 50 - 25).toFixed(0) + 'px');
    tapzoneEl.appendChild(el);
    el.addEventListener('animationend', function(){ el.remove(); });
  }

  var lastTapAt = 0;
  function tapCharge(e){
    if(e) e.preventDefault();
    var now = Date.now();
    if(now - lastTapAt < 50) return;
    lastTapAt = now;
    charge += 1;
    chargeNumEl.textContent = String(charge);
    retriggerAnim(tapbtn, 'tapped');
    retriggerAnim(chargeNumEl, 'pop');
    spawnFloatNum(charge);
  }

  function goTally(){
    screenPlay.classList.remove('active');
    screenTally.classList.add('active');
    tallyTimeoutId = setTimeout(showResult, 1200);
  }

  function showResult(){
    screenTally.classList.remove('active');

    var themeIndex = Math.floor(Math.random() * THEMES.length);
    if(THEMES.length > 1 && themeIndex === lastThemeIndex){
      themeIndex = (themeIndex + 1) % THEMES.length;
    }
    lastThemeIndex = themeIndex;
    var theme = THEMES[themeIndex];
    var names = shuffle(ENTRANTS).slice(0, 9);
    var playerScore = Math.max(1, Math.round(charge * 1.2 + Math.random() * 20 + 5));

    var rows = names.map(function(name){
      return {name: name, score: Math.max(1, Math.round(Math.random() * 40 + 5))};
    });
    rows.push({name: 'あなた', score: playerScore, me: true});
    rows = shuffle(rows);
    rows.sort(function(a, b){ return b.score - a.score; });

    var playerRank = 1;
    for(var i = 0; i < rows.length; i++){
      if(rows[i].me){ playerRank = i + 1; break; }
    }
    var badge = badgeFor(playerRank);

    document.getElementById('result-theme').textContent = theme.title;
    document.getElementById('result-title').textContent = badge;

    var tbody = document.getElementById('result-tbody');
    tbody.innerHTML = '';
    rows.forEach(function(row, idx){
      var tr = document.createElement('tr');
      if(row.me) tr.className = 'me';
      var tdRank = document.createElement('td');
      tdRank.textContent = String(idx + 1);
      var tdName = document.createElement('td');
      tdName.textContent = row.name;
      var tdScore = document.createElement('td');
      tdScore.textContent = row.score + theme.unit;
      tr.appendChild(tdRank);
      tr.appendChild(tdName);
      tr.appendChild(tdScore);
      tbody.appendChild(tr);
    });

    screenResult.style.display = 'block';

    var shareText = '「' + theme.title + '」で第' + playerRank + '位(' + playerScore + theme.unit + ')になった!\n称号は「' + badge + '」\n#バカゲー製作所';
    var shareUrl = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(shareText) + '&url=' + encodeURIComponent(GAME_URL);
    document.getElementById('btn-share').onclick = function(){
      window.open(shareUrl, '_blank', 'noopener');
    };
  }

  function onStart(e){ if(e) e.preventDefault(); startGame(); }
  function onRetry(e){
    if(e) e.preventDefault();
    screenResult.style.display = 'none';
    screenStart.style.display = 'block';
  }
  var btnStart = document.getElementById('btn-start');
  var btnRetry = document.getElementById('btn-retry');
  btnStart.addEventListener('click', onStart);
  btnStart.addEventListener('touchstart', onStart, {passive: false});
  btnRetry.addEventListener('click', onRetry);
  btnRetry.addEventListener('touchstart', onRetry, {passive: false});

  tapbtn.addEventListener('click', tapCharge);
  tapbtn.addEventListener('touchstart', tapCharge, {passive:false});
})();
</script>
</body>
</html>

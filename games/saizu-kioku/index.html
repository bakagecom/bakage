<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>サイズ記憶選手権 | バカゲー製作所</title>
<meta name="description" content="一瞬だけ表示される円の大きさを覚えて、消えた後にスライダーで同じ大きさを再現するだけ。近いほどセーフ、外れたら即終了。当てるほど表示時間も許容範囲も縮んでいくサイズ感覚バカゲー。">
<meta property="og:title" content="サイズ記憶選手権 | バカゲー製作所">
<meta property="og:description" content="一瞬見た円の大きさを覚えてスライダーで再現。ズレたら即終了、当てるほど表示時間も許容範囲も縮むサイズ記憶チャレンジ。">

<meta name="twitter:site" content="@bakage_com">
<meta name="twitter:image" content="https://bakage.com/assets/ogp-saizu-kioku.png">

<style>
:root{--bg:#63E6DE;--gear:#12B8A8;--ink:#181820;--pink:#FF5C78;--blue:#0076CE}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans",Meiryo,sans-serif;display:flex;flex-direction:column;touch-action:manipulation;user-select:none;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain}
body.playing{overflow:hidden}
a{color:var(--ink)}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:900;font-size:.9rem}
.topbar a{text-decoration:none;opacity:.75}
.stage{flex:1;position:relative;display:flex;align-items:center;justify-content:center;padding:16px}
.panel{width:100%;max-width:420px;text-align:center}

.card{background:#fff;border:4px solid var(--ink);border-radius:16px;padding:26px 22px;box-shadow:8px 8px 0 var(--ink);max-height:calc(100vh - 32px);overflow-y:auto}
.card h1{font-size:1.5rem;margin-bottom:10px}
.card p{font-size:.92rem;line-height:1.6;margin-bottom:16px}
.btn{display:inline-block;width:100%;padding:16px;font-size:1.1rem;font-weight:900;border:4px solid var(--ink);border-radius:12px;background:var(--pink);color:var(--ink);box-shadow:6px 6px 0 var(--ink);cursor:pointer;transition:transform .08s}
.btn:active{transform:translate(3px,3px);box-shadow:3px 3px 0 var(--ink)}
.btn.secondary{background:#fff;margin-top:12px}
.btn.share{background:var(--blue);color:#fff;margin-top:12px}

#screen-play{width:100%;height:100%;position:absolute;inset:0;display:none;flex-direction:column}
#screen-play.active{display:flex}
.hud{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;font-weight:900;font-size:.85rem}

.mainzone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:0 16px;min-height:0}
.court{position:relative;width:min(80vw,50vh,340px);height:min(80vw,50vh,340px);background:#fff;border:5px solid var(--ink);border-radius:20px;box-shadow:8px 8px 0 var(--gear);overflow:hidden;flex-shrink:0}
.shape{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;pointer-events:none;display:none}
.shape.shown{border:5px solid var(--ink);background:rgba(24,24,32,.05)}
.shape.answer{border:5px dashed var(--blue);background:rgba(0,118,206,.07)}

.slider-wrap{width:100%;max-width:320px;display:none}
.slider-wrap input[type=range]{width:100%;height:10px;-webkit-appearance:none;appearance:none;background:#fff;border:3px solid var(--ink);border-radius:8px;outline:none}
.slider-wrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:30px;height:30px;border-radius:50%;background:var(--pink);border:3px solid var(--ink);cursor:pointer}
.slider-wrap input[type=range]::-moz-range-thumb{width:30px;height:30px;border-radius:50%;background:var(--pink);border:3px solid var(--ink);cursor:pointer}

.feedback-line{font-size:.85rem;font-weight:700;min-height:1.3em}
.howto{text-align:center;font-size:.78rem;opacity:.65;padding:0 16px 14px;pointer-events:none}

.title-badge{display:inline-block;background:var(--bg);border:3px solid var(--ink);border-radius:10px;padding:6px 14px;font-weight:900;font-size:1.15rem;margin:10px 0}
.rank-line{font-size:.95rem;margin-bottom:6px}
.reason-line{font-size:.85rem;opacity:.75;margin-bottom:4px}
.combo-count{font-size:2.4rem;font-weight:900;color:var(--pink)}
footer{text-align:center;padding:10px;font-size:.72rem;opacity:.6}
</style>
</head>
<body>

<div class="topbar">
  <a href="../../">← バカゲー製作所</a>
  <span>📏 サイズ記憶選手権</span>
</div>

<div class="stage">
  <div class="panel" id="panel-outer">

    <div class="card" id="screen-start">
      <h1>📏 サイズ記憶選手権</h1>
      <p>一瞬だけ表示される円の大きさを覚えて、消えた後にスライダーで同じ大きさを再現するだけ。<br>近いほどセーフ、大きくズレたら即終了。<br>当てるほど表示時間も許容範囲もどんどん縮んでいくサイズ感覚の限界チャレンジ。</p>
      <button class="btn" id="btn-start">タップして開始</button>
    </div>

    <div class="card" id="screen-result" style="display:none">
      <h1>結果発表</h1>
      <div class="combo-count" id="result-count">0</div>
      <p style="margin-bottom:4px">回、サイズを再現できた</p>
      <div class="title-badge" id="result-title">称号</div>
      <p class="reason-line" id="result-reason"></p>
      <p class="reason-line" id="result-avg"></p>
      <p class="rank-line" id="result-rank"></p>
      <button class="btn share" id="btn-share">Xでシェアする</button>
      <button class="btn secondary" id="btn-retry">もう一度あそぶ</button>
    </div>

  </div>

  <div id="screen-play">
    <div class="hud">
      <span>成功数: <b id="score-num">0</b></span>
      <span>サイズ感集中</span>
    </div>
    <div class="mainzone">
      <div class="court" id="court">
        <div class="shape shown" id="shown-circle"></div>
        <div class="shape answer" id="answer-circle"></div>
      </div>
      <div class="feedback-line" id="feedback-line">&nbsp;</div>
      <div class="slider-wrap" id="slider-wrap">
        <input type="range" id="size-slider" min="0" max="1000" value="500">
      </div>
      <button class="btn" id="btn-confirm" style="display:none">この大きさで確定</button>
    </div>
    <div class="howto" id="howto-text">よく見て覚えろ!</div>
  </div>
</div>

<footer>バカゲー製作所 | <a href="https://x.com/bakage_com">@bakage_com</a></footer>

<script>
(function(){
  var GAME_URL = 'https://bakage.com/games/saizu-kioku/';
  var TAP_COOLDOWN_MS = 50;

  var FLASH_START = 1450;
  var FLASH_FLOOR = 600;
  var FLASH_STEP = 95;

  var ANSWER_TIME_START = 3400;
  var ANSWER_TIME_FLOOR = 1500;
  var ANSWER_TIME_STEP = 190;

  var TOL_RATIO_START = 0.30;
  var TOL_RATIO_FLOOR = 0.09;
  var TOL_RATIO_STEP = 0.021;

  var SUCCESS_PAUSE_MS = 450;
  var RANK_COEF = 300;

  var running = false;
  var score = 0;
  var state = 'idle'; // 'flash' | 'answer' | 'settling'
  var tolRatio = TOL_RATIO_START;
  var flashDuration = FLASH_START;
  var answerTimeLimit = ANSWER_TIME_START;
  var lastTapAt = 0;
  var genToken = 0;
  var deviations = [];

  var curShownRadius = 0, curMinR = 0, curMaxR = 0, curAnswerRadius = 0;

  var flashTimeoutId = null;
  var answerTimeoutId = null;
  var successTimeoutId = null;

  var screenStart = document.getElementById('screen-start');
  var screenPlay = document.getElementById('screen-play');
  var screenResult = document.getElementById('screen-result');
  var courtEl = document.getElementById('court');
  var shownCircleEl = document.getElementById('shown-circle');
  var answerCircleEl = document.getElementById('answer-circle');
  var feedbackEl = document.getElementById('feedback-line');
  var scoreNumEl = document.getElementById('score-num');
  var howtoEl = document.getElementById('howto-text');
  var sliderWrapEl = document.getElementById('slider-wrap');
  var sliderEl = document.getElementById('size-slider');
  var btnConfirmEl = document.getElementById('btn-confirm');

  function titleFor(s){
    if(s < 3) return '目分量ビギナー';
    if(s < 6) return 'サイズ感が芽生えてきた';
    if(s < 10) return '寸法マイスター';
    if(s < 16) return '人間ノギス';
    return '伝説のサイズ記憶職人';
  }

  function rankFor(s){
    var rank = 999983 - Math.round(s * s * RANK_COEF);
    if(rank < 2) rank = 2;
    return rank;
  }

  function randRange(min, max){
    return Math.random() * (max - min) + min;
  }

  function clearAllTimers(){
    clearTimeout(flashTimeoutId);
    clearTimeout(answerTimeoutId);
    clearTimeout(successTimeoutId);
    flashTimeoutId = null;
    answerTimeoutId = null;
    successTimeoutId = null;
  }

  function hideShapes(){
    shownCircleEl.style.display = 'none';
    answerCircleEl.style.display = 'none';
  }

  function setCircleSize(el, radius){
    el.style.width = (radius * 2) + 'px';
    el.style.height = (radius * 2) + 'px';
  }

  function scheduleRound(){
    if(!running) return;
    state = 'flash';
    hideShapes();
    sliderWrapEl.style.display = 'none';
    btnConfirmEl.style.display = 'none';
    feedbackEl.textContent = ' ';
    howtoEl.textContent = 'よく見て覚えろ!';

    var courtW = courtEl.clientWidth;
    var courtH = courtEl.clientHeight;
    var minSide = Math.min(courtW, courtH);

    curMinR = minSide * 0.05;
    curMaxR = minSide * 0.46;
    curShownRadius = randRange(minSide * 0.10, curMaxR * 0.9);

    setCircleSize(shownCircleEl, curShownRadius);
    shownCircleEl.style.display = 'block';

    var myGen = genToken;
    flashTimeoutId = setTimeout(function(){
      if(!running || myGen !== genToken) return;
      beginAnswerPhase();
    }, flashDuration);
  }

  function beginAnswerPhase(){
    if(!running) return;
    state = 'answer';
    shownCircleEl.style.display = 'none';
    howtoEl.textContent = 'スライダーで大きさを再現して確定!';
    sliderWrapEl.style.display = 'block';
    btnConfirmEl.style.display = 'block';
    answerCircleEl.style.display = 'block';
    sliderEl.disabled = false;
    btnConfirmEl.disabled = false;
    sliderWrapEl.style.opacity = '1';
    btnConfirmEl.style.opacity = '1';

    var startVal = Math.round(randRange(0, 1000));
    sliderEl.value = startVal;
    updateAnswerCircle(startVal);

    var myGen = genToken;
    answerTimeoutId = setTimeout(function(){
      if(!running || myGen !== genToken) return;
      endGame('timeout');
    }, answerTimeLimit);
  }

  function updateAnswerCircle(val){
    var r = curMinR + (val / 1000) * (curMaxR - curMinR);
    curAnswerRadius = r;
    setCircleSize(answerCircleEl, r);
  }

  function onSliderInput(){
    if(state !== 'answer') return;
    updateAnswerCircle(sliderEl.value);
  }

  function onRoundSuccess(pct){
    score++;
    scoreNumEl.textContent = String(score);
    deviations.push(pct);
    tolRatio = Math.max(TOL_RATIO_FLOOR, tolRatio - TOL_RATIO_STEP);
    flashDuration = Math.max(FLASH_FLOOR, flashDuration - FLASH_STEP);
    answerTimeLimit = Math.max(ANSWER_TIME_FLOOR, answerTimeLimit - ANSWER_TIME_STEP);
    state = 'settling';
    feedbackEl.textContent = 'ぴったり! ズレ ' + pct + '%';
    shownCircleEl.style.display = 'block';
    sliderEl.disabled = true;
    btnConfirmEl.disabled = true;
    sliderWrapEl.style.opacity = '0.5';
    btnConfirmEl.style.opacity = '0.5';

    var myGen = genToken;
    successTimeoutId = setTimeout(function(){
      if(!running || myGen !== genToken) return;
      scheduleRound();
    }, SUCCESS_PAUSE_MS);
  }

  function onConfirm(e){
    if(e) e.preventDefault();
    if(!running) return;
    var now = Date.now();
    if(now - lastTapAt < TAP_COOLDOWN_MS) return;
    lastTapAt = now;

    if(state !== 'answer') return;

    clearTimeout(answerTimeoutId);
    state = 'settling';

    var diffPx = Math.abs(curAnswerRadius - curShownRadius);
    var pct = Math.round((diffPx / curShownRadius) * 100);
    var tolerancePx = tolRatio * curShownRadius;

    if(diffPx <= tolerancePx){
      onRoundSuccess(pct);
    } else {
      endGame('miss', pct);
    }
  }

  function startGame(){
    genToken++;
    clearAllTimers();

    running = true;
    score = 0;
    tolRatio = TOL_RATIO_START;
    flashDuration = FLASH_START;
    answerTimeLimit = ANSWER_TIME_START;
    lastTapAt = 0;
    deviations = [];
    scoreNumEl.textContent = '0';

    screenStart.style.display = 'none';
    screenResult.style.display = 'none';
    screenPlay.classList.add('active');
    window.scrollTo(0, 0);
    document.body.classList.add('playing');

    scheduleRound();
  }

  function endGame(reason, missPct){
    if(!running) return;
    running = false;
    genToken++;
    clearAllTimers();
    document.body.classList.remove('playing');

    screenPlay.classList.remove('active');
    screenResult.style.display = 'block';

    var title = titleFor(score);
    var rank = rankFor(score);

    var reasonText;
    if(reason === 'timeout') reasonText = '考えている間にタイムアウト…';
    else reasonText = 'サイズのズレが大きすぎた(誤差 ' + missPct + '%)…';

    var avgText;
    if(deviations.length > 0){
      var sum = 0;
      for(var i = 0; i < deviations.length; i++) sum += deviations[i];
      var avg = Math.round(sum / deviations.length);
      avgText = '平均ズレ: ' + avg + '%';
    } else {
      avgText = '平均ズレ: --';
    }

    document.getElementById('result-count').textContent = String(score);
    document.getElementById('result-title').textContent = title;
    document.getElementById('result-reason').textContent = reasonText;
    document.getElementById('result-avg').textContent = avgText;
    document.getElementById('result-rank').textContent =
      'あなたは今日、日本で ' + rank.toLocaleString() + ' 番目にサイズ記憶が正確な人でした';

    var shareText = 'サイズ記憶選手権で' + score + '回連続でサイズを再現して「' + title + '」の称号を獲得!\n日本で' + rank.toLocaleString() + '番目にサイズ記憶が正確な人でした。\n#バカゲー製作所';
    var shareUrl = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(shareText) + '&url=' + encodeURIComponent(GAME_URL);
    document.getElementById('btn-share').onclick = function(){
      window.open(shareUrl, '_blank', 'noopener');
    };
  }

  function onStart(e){ if(e) e.preventDefault(); startGame(); }
  function onRetry(e){
    if(e) e.preventDefault();
    screenResult.style.display = 'none';
    screenStart.style.display = 'block';
    window.scrollTo(0, 0);
  }

  var btnStartEl = document.getElementById('btn-start');
  var btnRetryEl = document.getElementById('btn-retry');

  btnStartEl.addEventListener('click', onStart);
  btnStartEl.addEventListener('touchstart', onStart, {passive:false});
  btnRetryEl.addEventListener('click', onRetry);
  btnRetryEl.addEventListener('touchstart', onRetry, {passive:false});
  btnConfirmEl.addEventListener('click', onConfirm);
  btnConfirmEl.addEventListener('touchstart', onConfirm, {passive:false});
  sliderEl.addEventListener('input', onSliderInput);
})();
</script>
</body>
</html>

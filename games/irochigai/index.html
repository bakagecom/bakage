<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>色ちがいさがし | バカゲー製作所</title>
<meta name="description" content="15秒でマス目の中から1つだけ違う色のマスを探すバカゲー。ラウンドが進むほど色の差が分かりにくくなる。あなたは何個見つけられる?">
<meta property="og:title" content="色ちがいさがし | バカゲー製作所">
<meta property="og:description" content="1つだけ違う色を探せ!ラウンドを重ねるほど見分けが難しくなる観察力バカゲー。">
<meta property="og:image" content="https://bakage.com/assets/ogp-irochigai.png">
<meta property="og:url" content="https://bakage.com/games/irochigai/">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@bakage_com">
<meta name="twitter:image" content="https://bakage.com/assets/ogp-irochigai.png">
<link rel="icon" type="image/png" href="../../assets/favicon.png">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-JLPMYL3495"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-JLPMYL3495');
</script>
<style>
:root{--bg:#FFD100;--gear:#E8B400;--ink:#181820;--pink:#FF5C78;--blue:#0076CE}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans",Meiryo,sans-serif;display:flex;flex-direction:column;touch-action:manipulation;user-select:none;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain}
body.playing{overflow:hidden}
a{color:var(--ink)}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:900;font-size:.9rem}
.topbar a{text-decoration:none;opacity:.75}
.stage{flex:1;position:relative;display:flex;align-items:center;justify-content:center;padding:16px}
.panel{width:100%;max-width:420px;text-align:center}

.card{background:#fff;border:4px solid var(--ink);border-radius:16px;padding:26px 22px;box-shadow:8px 8px 0 var(--ink)}
.card h1{font-size:1.5rem;margin-bottom:10px}
.card p{font-size:.92rem;line-height:1.6;margin-bottom:16px}
.btn{display:inline-block;width:100%;padding:16px;font-size:1.1rem;font-weight:900;border:4px solid var(--ink);border-radius:12px;background:var(--pink);color:var(--ink);box-shadow:6px 6px 0 var(--ink);cursor:pointer;transition:transform .08s}
.btn:active{transform:translate(3px,3px);box-shadow:3px 3px 0 var(--ink)}
.btn.secondary{background:#fff;margin-top:12px}
.btn.share{background:var(--blue);color:#fff;margin-top:12px}

#screen-play{width:100%;height:100%;position:absolute;inset:0;display:none;flex-direction:column}
#screen-play.active{display:flex}
.hud{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;font-weight:900}
.timerbar-wrap{height:14px;margin:0 20px;border:3px solid var(--ink);border-radius:8px;background:#fff;overflow:hidden}
#timerbar{height:100%;background:var(--pink);width:100%;transform-origin:left}

.gridzone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:10px 20px}
#colorgrid{
  display:grid;gap:8px;width:min(82vw,320px);aspect-ratio:1/1;
}
.tile{
  border-radius:10px;border:3px solid var(--ink);cursor:pointer;
  transition:transform .08s;
}
.tile:active{transform:scale(.94)}
.tile.wrong{animation:shake .3s ease-out}
.tile.found{animation:foundPop .3s ease-out}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-4px)}
  75%{transform:translateX(4px)}
}
@keyframes foundPop{
  0%{transform:scale(1)}
  40%{transform:scale(1.15)}
  100%{transform:scale(1)}
}
.howto{text-align:center;font-size:.85rem;font-weight:900;opacity:.7;padding:4px 16px 12px;pointer-events:none}

.title-badge{display:inline-block;background:var(--bg);border:3px solid var(--ink);border-radius:10px;padding:6px 14px;font-weight:900;font-size:1.15rem;margin:10px 0}
.rank-line{font-size:.95rem;margin-bottom:6px}
.combo-count{font-size:2.4rem;font-weight:900;color:var(--pink)}
footer{text-align:center;padding:10px;font-size:.72rem;opacity:.6}
</style>
</head>
<body>

<div class="topbar">
  <a href="../../">← バカゲー製作所</a>
  <span>🎨 色ちがいさがし</span>
</div>

<div class="stage">
  <div class="panel" id="panel-outer">

    <div class="card" id="screen-start">
      <h1>🎨 色ちがいさがし</h1>
      <p>マス目の中に1つだけ、微妙に違う色のマスが隠れている。<br>15秒間でタップして見つけ続けろ。<br>ラウンドが進むほど、色の差が分かりにくくなる。</p>
      <button class="btn" id="btn-start">タップして開始</button>
    </div>

    <div class="card" id="screen-result" style="display:none">
      <h1>結果発表</h1>
      <div class="combo-count" id="result-count">0</div>
      <p style="margin-bottom:4px">個、見つけた</p>
      <div class="title-badge" id="result-title">称号</div>
      <p class="rank-line" id="result-rank"></p>
      <button class="btn share" id="btn-share">Xでシェアする</button>
      <button class="btn secondary" id="btn-retry">もう一度あそぶ</button>
    </div>

  </div>

  <div id="screen-play">
    <div class="hud">
      <span>発見: <b id="score-num">0</b></span>
      <span>⏱ <b id="time-num">15</b>s</span>
    </div>
    <div class="timerbar-wrap"><div id="timerbar"></div></div>
    <div class="gridzone">
      <div id="colorgrid"></div>
    </div>
    <div class="howto">👆 周りと違う色のマスをタッチ!</div>
  </div>
</div>

<footer>バカゲー製作所 | <a href="https://x.com/bakage_com">@bakage_com</a></footer>

<script>
(function(){
  var GAME_URL = 'https://bakage.com/games/irochigai/';
  var DURATION = 15;
  var TAP_COOLDOWN_MS = 50;
  var WRONG_PENALTY_SEC = 1;
  var MAX_GRID = 5;

  var running = false;
  var score = 0;
  var round = 1;
  var timeLeft = DURATION;
  var gameTimerId = null;
  var lastTapAt = 0;
  var oddIndex = -1;
  var roundLocked = false;

  var screenStart = document.getElementById('screen-start');
  var screenPlay = document.getElementById('screen-play');
  var screenResult = document.getElementById('screen-result');
  var scoreNumEl = document.getElementById('score-num');
  var timeNumEl = document.getElementById('time-num');
  var timerbarEl = document.getElementById('timerbar');
  var gridEl = document.getElementById('colorgrid');

  function titleFor(s){
    if(s < 3) return '色オンチ気味の新人';
    if(s < 7) return '観察力そこそこさん';
    if(s < 12) return '目のいい人';
    if(s < 18) return '色彩センスの化け物';
    return '伝説の色彩ハンター';
  }

  function rankFor(s){
    var rank = 999983 - Math.round(s * s * 900);
    if(rank < 2) rank = 2;
    return rank;
  }

  function gridSizeForRound(r){
    if(r <= 2) return 3;
    if(r <= 5) return 4;
    return MAX_GRID;
  }

  function deltaForRound(r){
    var d = 26 - (r - 1) * 2;
    if(d < 9) d = 9;
    return d;
  }

  function renderRound(){
    var size = gridSizeForRound(round);
    var delta = deltaForRound(round);
    var hue = Math.floor(Math.random() * 360);
    var sat = 55 + Math.floor(Math.random() * 20);
    var baseLight = 45 + Math.floor(Math.random() * 10);
    var total = size * size;
    oddIndex = Math.floor(Math.random() * total);

    roundLocked = false;
    gridEl.style.gridTemplateColumns = 'repeat(' + size + ', 1fr)';
    gridEl.innerHTML = '';

    for(var i = 0; i < total; i++){
      var tile = document.createElement('div');
      tile.className = 'tile';
      tile.dataset.idx = String(i);
      var light = (i === oddIndex) ? Math.min(90, baseLight + delta) : baseLight;
      tile.style.background = 'hsl(' + hue + ',' + sat + '%,' + light + '%)';
      tile.addEventListener('click', onTileTap);
      tile.addEventListener('touchstart', onTileTap, {passive:false});
      gridEl.appendChild(tile);
    }
  }

  function onTileTap(e){
    if(e) e.preventDefault();
    if(!running || roundLocked) return;
    var now = Date.now();
    if(now - lastTapAt < TAP_COOLDOWN_MS) return;
    lastTapAt = now;

    var idx = Number(this.dataset.idx);
    if(idx === oddIndex){
      roundLocked = true;
      this.classList.add('found');
      score++;
      round++;
      scoreNumEl.textContent = String(score);
      setTimeout(function(){ if(running) renderRound(); }, 140);
    } else {
      this.classList.add('wrong');
      timeLeft = Math.max(0, timeLeft - WRONG_PENALTY_SEC);
      var self = this;
      setTimeout(function(){ self.classList.remove('wrong'); }, 300);
    }
  }

  function startGame(){
    clearInterval(gameTimerId);

    running = true;
    score = 0;
    round = 1;
    timeLeft = DURATION;
    lastTapAt = 0;

    scoreNumEl.textContent = '0';
    timeNumEl.textContent = String(DURATION);
    timerbarEl.style.transition = 'none';
    timerbarEl.style.width = '100%';

    screenStart.style.display = 'none';
    screenResult.style.display = 'none';
    screenPlay.classList.add('active');
    window.scrollTo(0, 0);
    document.body.classList.add('playing');

    renderRound();

    timerbarEl.style.transition = 'width .1s linear';

    var elapsedMs = 0;
    gameTimerId = setInterval(function(){
      elapsedMs += 100;
      var displayed = Math.max(0, timeLeft - elapsedMs / 1000);
      timeNumEl.textContent = String(Math.ceil(displayed));
      timerbarEl.style.width = Math.max(0, (displayed / DURATION) * 100) + '%';
      if(displayed <= 0){
        endGame();
      }
    }, 100);
  }

  function endGame(){
    if(!running) return;
    running = false;
    clearInterval(gameTimerId);
    document.body.classList.remove('playing');

    screenPlay.classList.remove('active');
    screenResult.style.display = 'block';

    var title = titleFor(score);
    var rank = rankFor(score);

    document.getElementById('result-count').textContent = String(score);
    document.getElementById('result-title').textContent = title;
    document.getElementById('result-rank').textContent =
      'あなたは今日、日本で ' + rank.toLocaleString() + ' 番目に色を見分ける目を持つ人でした';

    var shareText = '色ちがいさがしで' + score + '個発見して「' + title + '」の称号を獲得!\n日本で' + rank.toLocaleString() + '番目に色を見分ける目を持つ人でした。\n#バカゲー製作所';
    var shareUrl = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(shareText) + '&url=' + encodeURIComponent(GAME_URL);
    document.getElementById('btn-share').onclick = function(){
      window.open(shareUrl, '_blank', 'noopener');
    };
  }

  function onStart(e){ if(e) e.preventDefault(); startGame(); }
  function onRetry(e){
    if(e) e.preventDefault();
    screenResult.style.display = 'none';
    screenStart.style.display = 'block';
    window.scrollTo(0, 0);
  }

  var btnStart = document.getElementById('btn-start');
  var btnRetry = document.getElementById('btn-retry');
  btnStart.addEventListener('click', onStart);
  btnStart.addEventListener('touchstart', onStart, {passive:false});
  btnRetry.addEventListener('click', onRetry);
  btnRetry.addEventListener('touchstart', onRetry, {passive:false});
})();
</script>
</body>
</html>

<style>
:root{--bg:#FFD100;--gear:#E8B400;--ink:#181820;--pink:#FF5C78;--blue:#0076CE}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans",Meiryo,sans-serif;min-height:100vh;display:flex;flex-direction:column}
header{padding:48px 24px 24px;text-align:center}
header img{width:120px;height:120px;image-rendering:pixelated}
h1{font-size:2.2rem;font-weight:900;letter-spacing:.05em;margin-top:12px}
.tagline{margin-top:8px;font-size:1rem;opacity:.85}
main{flex:1;max-width:900px;width:100%;margin:0 auto;padding:24px}
.games{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
.game-card{background:#fff;border:4px solid var(--ink);border-radius:12px;padding:20px;text-decoration:none;color:var(--ink);box-shadow:6px 6px 0 var(--ink);transition:transform .1s}
.game-card:hover{transform:translate(-2px,-2px);box-shadow:8px 8px 0 var(--ink)}
.game-card h2{font-size:1.2rem;margin-bottom:8px}
.game-card p{font-size:.85rem;opacity:.8}
.game-card .date{display:inline-block;margin-top:10px;font-size:.75rem;background:var(--bg);padding:2px 8px;border-radius:4px;font-weight:700}
.empty{text-align:center;padding:60px 20px;font-weight:700}
.empty .big{font-size:3rem;display:block;margin-bottom:16px}
footer{text-align:center;padding:32px 24px;font-size:.8rem;opacity:.75}
footer a{color:var(--ink)}
</style>
</head>
<body>
<header>
  <img src="./assets/favicon.png" alt="バカゲー製作所マスコット">
  <h1>バカゲー製作所</h1>
  <p class="tagline">バカゲー製作所が毎日ゲームを製造する工場⚙️ 30秒で遊べるムダなゲームをどうぞ。</p>
</header>
<main>
  <div id="games" class="games"></div>
  <div id="empty" class="empty" hidden>
    <span class="big">🏭</span>
    工場は稼働準備中です。初出荷をお待ちください。
  </div>
</main>
<footer>
  <p>運営: バカゲー製作所 | 工場見学: <a href="https://x.com/bakage_com">@bakage_com</a></p>
</footer>
<script>
fetch('./games/index.json').then(r=>r.json()).then(list=>{
  const c=document.getElementById('games');
  if(!list.length){document.getElementById('empty').hidden=false;return}
  list.sort((a,b)=>b.date.localeCompare(a.date)).forEach(g=>{
    const a=document.createElement('a');
    a.className='game-card';a.href='./games/'+g.slug+'/';
    a.innerHTML='<h2>'+g.emoji+' '+g.title+'</h2><p>'+g.description+'</p><span class="date">'+g.date+' 出荷</span>';
    c.appendChild(a);
  });
}).catch(()=>{document.getElementById('empty').hidden=false});
</script>
</body>
</html>
